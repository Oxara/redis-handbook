<details open>
<summary><b>🟣 .NET Core</b></summary>

\`\`\`csharp
public class MemoryDiagnosticsService
{
    private readonly IConnectionMultiplexer _mux;
    private readonly ILogger<MemoryDiagnosticsService> _logger;

    public MemoryDiagnosticsService(IConnectionMultiplexer mux,
        ILogger<MemoryDiagnosticsService> logger)
    {
        _mux = mux;
        _logger = logger;
    }

    // TTL'siz büyük key'leri bul
    public async Task<List<KeyMemoryInfo>> FindLeakyKeysAsync(
        string pattern = "*", long minBytes = 10_000)
    {
        var server = _mux.GetServers().First();
        var db = _mux.GetDatabase();
        var leaks = new List<KeyMemoryInfo>();

        await foreach (var key in server.KeysAsync(pattern: pattern, pageSize: 500))
        {
            var ttl = await db.KeyTimeToLiveAsync(key);
            if (ttl is not null) continue; // TTL var → muhtemelen OK

            var memoryUsage = await db.ExecuteAsync("MEMORY", "USAGE", key.ToString());
            var bytes = (long?)memoryUsage ?? 0;

            if (bytes >= minBytes)
            {
                leaks.Add(new KeyMemoryInfo
                {
                    Key = key.ToString(),
                    Bytes = bytes,
                    Type = (await db.KeyTypeAsync(key)).ToString()
                });
            }
        }

        return leaks.OrderByDescending(k => k.Bytes).Take(50).ToList();
    }

    // Scheduled: haftalık memory raporu
    public async Task LogMemoryReportAsync()
    {
        var server = _mux.GetServers().First();
        var info = await server.InfoAsync("memory");
        var mem = info.First().ToDictionary(p => p.Key, p => p.Value);

        _logger.LogInformation(
            "Redis Memory: used={Used}, peak={Peak}, frag={Frag}, maxmemory={Max}",
            mem["used_memory_human"],
            mem["used_memory_peak_human"],
            mem["mem_fragmentation_ratio"],
            mem.GetValueOrDefault("maxmemory_human") ?? "unlimited");
    }
}

public record KeyMemoryInfo
{
    public string Key { get; init; } = "";
    public long Bytes { get; init; }
    public string Type { get; init; } = "";
}
\`\`\`

</details>

public class GeoLocationService
{
    private readonly IDatabase _redis;

    public GeoLocationService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task AddStoreAsync(string storeId, double longitude, double latitude)
    {
        await _redis.GeoAddAsync("stores:istanbul",
            new GeoEntry(longitude, latitude, storeId));
    }

    public async Task AddBulkAsync(IEnumerable<(string id, double lon, double lat)> stores)
    {
        var entries = stores.Select(s => new GeoEntry(s.lon, s.lat, s.id)).ToArray();
        await _redis.GeoAddAsync("stores:istanbul", entries);
    }

    // Yarıçap sorgusu — yakındaki mağazalar
    public async Task<List<NearbyStore>> GetNearbyStoresAsync(
        double longitude, double latitude, double radiusKm, int count = 10)
    {
        var results = await _redis.GeoSearchAsync("stores:istanbul",
            new GeoSearchCircle(longitude, latitude, radiusKm, GeoUnit.Kilometers),
            count: count,
            order: Order.Ascending, // en yakından uzağa
            options: GeoRadiusOptions.WithCoordinates | GeoRadiusOptions.WithDistance);

        return results.Select(r => new NearbyStore
        {
            StoreId = r.Member.ToString(),
            DistanceKm = r.Distance ?? 0,
            Longitude = r.Position?.Longitude ?? 0,
            Latitude = r.Position?.Latitude ?? 0
        }).ToList();
    }

    // İki mağaza arası mesafe
    public async Task<double?> GetDistanceAsync(string store1, string store2)
    {
        return await _redis.GeoDistanceAsync("stores:istanbul", store1, store2, GeoUnit.Kilometers);
    }

    // Kullanıcı konumunu güncelle (gerçek zamanlı takip)
    public async Task UpdateUserLocationAsync(string userId, double lon, double lat)
    {
        await _redis.GeoAddAsync("active:users", new GeoEntry(lon, lat, userId));
        await _redis.KeyExpireAsync("active:users", TimeSpan.FromMinutes(15));
    }
}

// API endpoint örneği
app.MapGet("/api/stores/nearby", async (
    [FromQuery] double lon,
    [FromQuery] double lat,
    [FromQuery] double radius,
    GeoLocationService geo) =>
{
    var stores = await geo.GetNearbyStoresAsync(lon, lat, radius);
    return Results.Ok(stores);
});

public class UniqueVisitorService
{
    private readonly IDatabase _redis;

    public UniqueVisitorService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // Ziyaretçi kaydet
    public async Task TrackVisitorAsync(string userId)
    {
        var key = $"uv:{DateTime.UtcNow:yyyy-MM-dd}";
        await _redis.HyperLogLogAddAsync(key, userId);
        await _redis.KeyExpireAsync(key, TimeSpan.FromDays(90));
    }

    // Bugünkü unique ziyaretçi sayısı
    public async Task<long> GetTodayUniqueCountAsync()
    {
        var key = $"uv:{DateTime.UtcNow:yyyy-MM-dd}";
        return await _redis.HyperLogLogLengthAsync(key);
    }

    // Son N günün toplam unique ziyaretçisi
    public async Task<long> GetUniqueCountForDaysAsync(int days)
    {
        var keys = Enumerable.Range(0, days)
            .Select(i => (RedisKey)$"uv:{DateTime.UtcNow.AddDays(-i):yyyy-MM-dd}")
            .ToArray();

        // PFCOUNT birden fazla key ile çağrılınca merge + count yapar
        return await _redis.HyperLogLogLengthAsync(keys);
    }

    // Haftalık merge (raporlama için)
    public async Task MergeWeeklyAsync(int year, int week)
    {
        var destKey = $"uv:week:{year}:{week}";
        var startOfWeek = ISOWeek.ToDateTime(year, week, DayOfWeek.Monday);
        var sourceKeys = Enumerable.Range(0, 7)
            .Select(i => (RedisKey)$"uv:{startOfWeek.AddDays(i):yyyy-MM-dd}")
            .ToArray();

        await _redis.HyperLogLogMergeAsync(destKey, sourceKeys);
        await _redis.KeyExpireAsync(destKey, TimeSpan.FromDays(365));
    }

    // Unique event tracking (page, feature usage)
    public async Task TrackFeatureUsageAsync(string feature, string userId)
    {
        await _redis.HyperLogLogAddAsync($"feature:{feature}:users", userId);
    }
}

## Key Expiration & Eviction Stratejileri 🟡

### TTL Yönetimi

<details>
<summary><b>🔴 Redis CLI</b></summary>

\`\`\`bash
# TTL ata
SET key "value" EX 3600         # saniye
SET key "value" PX 3600000      # milisaniye
EXPIRE key 3600                 # mevcut key'e TTL ekle
PEXPIRE key 3600000
EXPIREAT key 1748390400         # Unix timestamp

# TTL sorgula
TTL key                         # saniye (-1: TTL yok, -2: key yok)
PTTL key                        # milisaniye

# TTL kaldır
PERSIST key

# Atomik increment + expire (Lua ile — native INCREX komutu yoktur)
EVAL "local v = redis.call('INCR', KEYS[1]); redis.call('EXPIRE', KEYS[1], ARGV[1]); return v" 1 mycounter 60
\`\`\`

</details>

<details open>
<summary><b>🟣 .NET Core</b></summary>

\`\`\`csharp
public class ExpirationService
{
    private readonly IDatabase _redis;

    public ExpirationService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // Set + TTL (en yaygın)
    public async Task SetWithExpiryAsync(string key, string value, TimeSpan ttl)
    {
        await _redis.StringSetAsync(key, value, ttl);
    }

    // Mevcut key'e TTL ekle/güncelle
    public async Task SetExpiryAsync(string key, TimeSpan ttl)
    {
        await _redis.KeyExpireAsync(key, ttl);
    }

    // Belirli bir zaman (absolute expiration)
    public async Task SetExpiryAtAsync(string key, DateTime expireAt)
    {
        await _redis.KeyExpireAsync(key, expireAt);
    }

    // Kalan TTL kontrol
    public async Task<TimeSpan?> GetTtlAsync(string key)
    {
        return await _redis.KeyTimeToLiveAsync(key);
    }

    // Sliding expiration pattern
    public async Task<string?> GetWithSlidingExpiryAsync(string key, TimeSpan slidingTtl)
    {
        var value = await _redis.StringGetAsync(key);
        if (value.HasValue)
        {
            // Her okumada TTL yenile
            await _redis.KeyExpireAsync(key, slidingTtl);
        }
        return value;
    }

    // Keyspace notifications ile expire dinle
    public async Task SubscribeToExpirationsAsync(Action<string> onExpired)
    {
        // redis.conf: notify-keyspace-events Ex
        var sub = _redis.Multiplexer.GetSubscriber();
        await sub.SubscribeAsync(
            RedisChannel.Pattern("__keyevent@0__:expired"),
            (channel, key) => onExpired(key.ToString()));
    }

    // Atomik increment + expire (Lua script)
    private static readonly LuaScript _incrExScript = LuaScript.Prepare(@"
        local v = redis.call('INCR', @key)
        if v == 1 then
            redis.call('EXPIRE', @key, @ttl)
        end
        return v
    ");

    public async Task<long> IncrementWithExpiryAsync(string key, int ttlSeconds = 60)
    {
        var result = await _redis.ScriptEvaluateAsync(_incrExScript, new
        {
            key = (RedisKey)key,
            ttl = ttlSeconds
        });
        return (long)result;
    }
}
\`\`\`

### Eviction Policies

| Policy | Davranış | Ne Zaman |
|--------|----------|----------|
| **noeviction** | Yeni yazım hata verir | Veri kaybı kabul edilemez |
| **allkeys-lru** | En az kullanılanı sil | Genel cache |
| **allkeys-lfu** | En az frekansla kullanılanı sil | Hot data koruması |
| **volatile-lru** | TTL'li key'lerden LRU | TTL'siz key'ler korunmalı |
| **volatile-lfu** | TTL'li key'lerden LFU | TTL'siz key'ler korunmalı |
| **volatile-ttl** | En kısa TTL'yi sil | Doğal sıralama |
| **allkeys-random** | Rastgele sil | Uniform erişim |

> 💡 **Önerilen:** Cache → \`allkeys-lru\`. Persistent store → \`noeviction\`. Hot data koruması → \`allkeys-lfu\`.

### Keyspace Notifications (Expired Event)

Key expire olunca tetiklenen event — cleanup logic, audit trail, veya cascade invalidation için kullanılır.

\`\`\`bash
# redis.conf'ta etkinleştir (varsayılan kapalı):
notify-keyspace-events Ex
# E = keyevent, x = expired events
# Runtime'da:
CONFIG SET notify-keyspace-events Ex
\`\`\`

\`\`\`csharp
// .NET'te expired key event'lerini dinle
public class KeyExpirationListener : BackgroundService
{
    private readonly IConnectionMultiplexer _mux;
    private readonly ILogger<KeyExpirationListener> _logger;
    private readonly IServiceScopeFactory _scopeFactory;

    public KeyExpirationListener(IConnectionMultiplexer mux,
        ILogger<KeyExpirationListener> logger, IServiceScopeFactory scopeFactory)
    {
        _mux = mux;
        _logger = logger;
        _scopeFactory = scopeFactory;
    }

    protected override async Task ExecuteAsync(CancellationToken ct)
    {
        var sub = _mux.GetSubscriber();

        // db0'daki tüm expire event'lerini dinle
        await sub.SubscribeAsync(
            RedisChannel.Pattern("__keyevent@0__:expired"),
            async (channel, expiredKey) =>
            {
                var key = expiredKey.ToString();
                _logger.LogDebug("Key expired: {Key}", key);

                // Prefix'e göre aksiyon al
                if (key.StartsWith("session:"))
                {
                    // Session expire → audit log
                    using var scope = _scopeFactory.CreateScope();
                    var audit = scope.ServiceProvider.GetRequiredService<IAuditService>();
                    await audit.LogSessionExpiredAsync(key);
                }
                else if (key.StartsWith("lock:"))
                {
                    // Orphan lock temizlendi — monitoring metric
                    _logger.LogWarning("Lock expired (possible timeout): {Key}", key);
                }
            });

        // Cancellation bekle
        await Task.Delay(Timeout.Infinite, ct);
    }
}

// DI kayıt
builder.Services.AddHostedService<KeyExpirationListener>();
\`\`\`

> ⚠️ **Keyspace notification at-most-once'tır.** Client disconnect anında gelen event kaybolur. Kritik iş logic'i için güvenme — sadece monitoring/audit amaçlı kullan. Garantili expiration logic için polling (SCAN + TTL check) tercih et.

### Ne Zaman Hangisi?

| Senaryo | Sentinel | Cluster | Neden |
|---------|:--------:|:-------:|-------|
| Veri <32GB, HA istiyorum | ✅ | ❌ | Gereksiz karmaşıklık, Sentinel yeterli |
| Veri >64GB (tek node'a sığmıyor) | ❌ | ✅ | Veriyi dağıtman gerekiyor |
| >100K ops/s write throughput | ❌ | ✅ | Tek master write bottleneck |
| MGET, TRANSACTION, Lua multi-key | ✅ | ⚠️ | Cluster'da hash tag zorunlu, kısıtlı |
| Basit mimari, az ops overhead | ✅ | ❌ | Cluster yönetimi daha karmaşık |
| AWS ElastiCache / Azure Cache managed | ✅ ya da ✅ | ✅ | Managed service'te her ikisi de kolay |
| Mevcut uygulama multi-DB (SELECT 1,2..) | ✅ | ❌ | Cluster'da SELECT yasak |

> 💡 **Gerçek hayat kararı:** Çoğu startup ve orta ölçek SaaS için **Sentinel yeterli**. 64GB RAM'lik bir Redis server milyarlarca küçük key barındırabilir. Cluster'a geçiş: veri RAM'e sığmadığında veya write throughput tek master'ı doyurduğunda düşün. **Erken optimize etme — Sentinel ile başla, ölç, gerekirse Cluster'a geç.**

> ⚠️ **Hibrit kullanım:** Cluster mode'da her master node'un zaten replica'ları var (built-in HA). Yani Cluster = Sentinel + Sharding. Cluster seçersen ayrıca Sentinel kurmanıza **gerek yok** — Cluster kendi failover'ını yönetir.

// Sentinel bağlantısı — otomatik failover desteği
var config = new ConfigurationOptions
{
    ServiceName = "mymaster",  // Sentinel monitör adı
    Password = "masterpass",
    AbortOnConnectFail = false,
    ConnectRetry = 3,
    ConnectTimeout = 5000,
    DefaultDatabase = 0,
    AllowAdmin = false
};
config.EndPoints.Add("sentinel-1:26379");
config.EndPoints.Add("sentinel-2:26379");
config.EndPoints.Add("sentinel-3:26379");

builder.Services.AddSingleton<IConnectionMultiplexer>(
    ConnectionMultiplexer.Connect(config));

// Failover event'ini dinle
var mux = ConnectionMultiplexer.Connect(config);
mux.ConnectionFailed += (sender, args) =>
{
    logger.LogWarning("Redis connection failed: {FailureType} - {Exception}",
        args.FailureType, args.Exception?.Message);
};
mux.ConnectionRestored += (sender, args) =>
{
    logger.LogInformation("Redis connection restored: {EndPoint}", args.EndPoint);
};

// Read replicas'dan okuma (yazım master'a gider)
var db = mux.GetDatabase();
// Replica'dan oku (eventual consistency)
var value = await db.StringGetAsync("key", CommandFlags.PreferReplica);
// Master'dan oku (strong consistency)
var fresh = await db.StringGetAsync("key", CommandFlags.DemandMaster);
\`\`\`

</details>

> ⚠️ **Replication async'tir.** Master'a yazılan veri replica'ya ulaşmadan master çökerse veri kaybı olabilir. \`WAIT\` komutu ile sync replication mümkün ama latency artar.

> ⛔ **Sentinel + Multi-DB:** Sentinel sadece db0'ı monitor eder. Failover sonrası yeni master'da diğer DB'lere SELECT yapılabilir ama Sentinel'in health check'i sadece db0 üzerinden çalışır. **Production'da Sentinel kullanıyorsan db0 + key prefix tercih et.**

\`\`\`csharp
// Cluster bağlantısı
var config = new ConfigurationOptions
{
    AbortOnConnectFail = false,
    ConnectRetry = 5,
    ConnectTimeout = 10000,
    Password = "clusterpass"
};
// Tüm node'ları ekle (discovery otomatik çalışır ama seed gerekli)
config.EndPoints.Add("redis-1:6379");
config.EndPoints.Add("redis-2:6379");
config.EndPoints.Add("redis-3:6379");

builder.Services.AddSingleton<IConnectionMultiplexer>(
    ConnectionMultiplexer.Connect(config));

// Hash tag ile multi-key operasyonlar
public class UserClusterService
{
    private readonly IDatabase _redis;

    public UserClusterService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // Hash tag: {user:1001} → aynı slot
    public async Task SetUserDataAsync(int userId, UserProfile profile, UserSettings settings)
    {
        var batch = _redis.CreateBatch();

        // Aynı hash tag → aynı slot → transaction mümkün
        _ = batch.StringSetAsync($"{{user:{userId}}}:profile",
            JsonSerializer.Serialize(profile), TimeSpan.FromHours(1));
        _ = batch.StringSetAsync($"{{user:{userId}}}:settings",
            JsonSerializer.Serialize(settings), TimeSpan.FromHours(1));

        batch.Execute();
    }

    // Multi-key SCAN (cluster'da her node'a gider)
    public async Task<List<string>> ScanKeysAsync(string pattern, int count = 100)
    {
        var server = _redis.Multiplexer.GetServers();
        var keys = new List<string>();

        foreach (var srv in server)
        {
            await foreach (var key in srv.KeysAsync(pattern: pattern, pageSize: count))
            {
                keys.Add(key.ToString());
            }
        }
        return keys;
    }
}
\`\`\`

</details>

> ⚠️ **Cluster'da KEYS, SCAN, FLUSHALL** tüm node'lara gider. \`MGET/MSET\` farklı slot'lardaki key'lere çalışmaz → hash tag kullan: \`{user:1001}:field\`.

> ⛔ **Cluster + SELECT:** Redis Cluster'da **sadece db0** kullanılabilir. \`SELECT 1\` komutu \`ERR SELECT is not allowed in cluster mode\` hatası verir. Mevcut multi-DB kullanan uygulamayı Cluster'a taşıyorsan tüm DB ayrımını key prefix'e çevirmelisin.

> 🔗 **İlgili:** Sentinel vs Cluster karar rehberi bu bölümün başında. Replication & Sentinel detayları yukarıda.

### Ne Zaman Output Cache Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Aynı response farklı kullanıcılara dönüyor (public) | Her kullanıcıya farklı response (kişiselleştirilmiş) | **E-ticaret:** Ürün listesi sayfası — tüm ziyaretçiler aynı listeyi görür |
| Response üretmek pahalı (DB query + serialization) | Response çok küçük ve hızlı üretiliyor (<1ms) | **CMS:** Blog post render — Markdown→HTML 50ms, cache'ten 0ms |
| Read-heavy endpoint (%90+ GET) | Sık değişen veri (anlık stok, canlı skor) | **API:** /api/categories — günde 1 kez değişir, saatte 100K hit |
| Multi-instance uygulama (shared cache gerekli) | Tek pod + IMemoryCache yeterli | **SaaS:** 10 pod arkasında — Output Cache Redis'te → hepsi aynı cache |

> 💡 **Gerçek hayat senaryosu — Blog platformu:** Her blog post'u render etmek 40-80ms (Markdown parse + syntax highlight + template). Output Cache 5dk TTL → ilk request sonrası tüm ziyaretçiler 0ms'de response alır. Post güncellenince \`IOutputCacheStore.EvictByTagAsync("post:123")\` ile invalidate.

<summary><b>🔴 Redis CLI</b></summary>

GET "myapp:ResponseCache:/api/products?page=1"

<details open>
<summary><b>🟣 .NET Core</b></summary>

\`\`\`csharp
// === Output Caching (.NET 7+) — Redis backend ===
// NuGet: dotnet add package Microsoft.Extensions.Caching.StackExchangeRedis

builder.Services.AddStackExchangeRedisOutputCache(options =>
{
    options.Configuration = builder.Configuration.GetConnectionString("Redis");
    options.InstanceName = "oc:";
});

builder.Services.AddOutputCache(options =>
{
    // Global policy
    options.AddBasePolicy(builder => builder.Expire(TimeSpan.FromMinutes(5)));

    // Named policy
    options.AddPolicy("ProductList", builder =>
        builder.Expire(TimeSpan.FromMinutes(10))
               .Tag("products"));

    // Vary by query string
    options.AddPolicy("Paginated", builder =>
        builder.SetVaryByQuery("page", "size")
               .Expire(TimeSpan.FromMinutes(5)));
});

var app = builder.Build();
app.UseOutputCache();

// Endpoint'lere uygula
app.MapGet("/api/products", async (AppDbContext db) =>
{
    var products = await db.Products.AsNoTracking().ToListAsync();
    return Results.Ok(products);
})
.CacheOutput("ProductList");

// Tag-based invalidation
app.MapPost("/api/products", async (
    Product product,
    AppDbContext db,
    IOutputCacheStore cache) =>
{
    db.Products.Add(product);
    await db.SaveChangesAsync();

    // "products" tag'li tüm cache entry'leri temizle
    await cache.EvictByTagAsync("products", default);
    return Results.Created($"/api/products/{product.Id}", product);
});

// Controller'da kullanım
[OutputCache(Duration = 300, VaryByQueryKeys = new[] { "category" })]
[HttpGet]
public async Task<IActionResult> GetProducts([FromQuery] string? category)
{
    // ...
}

| Özellik | Output Cache | Response Cache |
|---------|-------------|---------------|
| **Depolama** | Redis (server-side) | HTTP headers (client/proxy) |
| **Tag invalidation** | Evet | Hayır |
| **Programmatic eviction** | Evet | Hayır |
| **Authenticated** | Varsayılan hayır (config ile evet) | Hayır |
| **Ne zaman** | API response'lar | Statik/public content |

// NuGet: dotnet add package Microsoft.AspNetCore.SignalR.StackExchangeRedis

builder.Services.AddSignalR()
    .AddStackExchangeRedis(builder.Configuration.GetConnectionString("Redis")!, options =>
    {
        options.Configuration.ChannelPrefix = RedisChannel.Literal("SignalR");
    });

// Hub (değişiklik yok — Redis backplane şeffaf çalışır)
public class NotificationHub : Hub
{
    public async Task SendToUser(string userId, string message)
    {
        await Clients.User(userId).SendAsync("ReceiveNotification", message);
    }

    public async Task SendToGroup(string group, string message)
    {
        await Clients.Group(group).SendAsync("ReceiveMessage", message);
    }

    public override async Task OnConnectedAsync()
    {
        var userId = Context.UserIdentifier;
        if (userId is not null)
            await Groups.AddToGroupAsync(Context.ConnectionId, $"user:{userId}");

        await base.OnConnectedAsync();
    }
}

// Controller'dan hub'a mesaj gönderme (herhangi bir instance'dan)
[ApiController]
[Route("api/[controller]")]
public class NotificationsController : ControllerBase
{
    private readonly IHubContext<NotificationHub> _hubContext;

    public NotificationsController(IHubContext<NotificationHub> hubContext)
        => _hubContext = hubContext;

    [HttpPost("broadcast")]
    public async Task<IActionResult> Broadcast([FromBody] string message)
    {
        // Bu mesaj Redis üzerinden TÜM instance'lardaki client'lara ulaşır
        await _hubContext.Clients.All.SendAsync("ReceiveNotification", message);
        return Ok();
    }

    [HttpPost("user/{userId}")]
    public async Task<IActionResult> SendToUser(string userId, [FromBody] string message)
    {
        await _hubContext.Clients.User(userId).SendAsync("ReceiveNotification", message);
        return Ok();
    }
}

## Persistence — RDB & AOF Detay 🔴

### Karşılaştırma

| | RDB (Snapshot) | AOF (Append-Only File) | Hybrid (Önerilen) |
|---|---|---|---|
| **Mekanizma** | Fork + dump | Her komut loglama | RDB preamble + AOF tail |
| **Veri kaybı** | Son snapshot'tan beri | fsync policy'ye göre (max 1s) | Max 1s |
| **Dosya boyutu** | Compact | Büyük (rewrite ile küçülür) | Orta |
| **Restart hızı** | Hızlı | Yavaş (replay) | Hızlı |
| **CPU** | Fork sırasında spike | Sürekli düşük | Dengeli |

<details>
<summary><b>🔴 Redis CLI</b></summary>

// Persistence doğrudan .NET'ten yönetilmez — redis.conf ile yapılır.
// Ama persistence durumunu monitoring'e dahil edebilirsin:

public class RedisMonitoringService
{
    private readonly IConnectionMultiplexer _mux;

    public RedisMonitoringService(IConnectionMultiplexer mux)
        => _mux = mux;

    public async Task<PersistenceStatus> GetPersistenceStatusAsync()
    {
        var server = _mux.GetServers().First();
        var info = await server.InfoAsync("persistence");

        var section = info.First(s => s.Key == "persistence");
        var dict = section.ToDictionary(p => p.Key, p => p.Value);

        return new PersistenceStatus
        {
            RdbLastSaveTime = DateTimeOffset.FromUnixTimeSeconds(
                long.Parse(dict["rdb_last_save_time"])).UtcDateTime,
            RdbChangesSinceLastSave = long.Parse(dict["rdb_changes_since_last_save"]),
            AofEnabled = dict["aof_enabled"] == "1",
            AofCurrentSize = long.Parse(dict.GetValueOrDefault("aof_current_size") ?? "0"),
            AofLastRewriteStatus = dict.GetValueOrDefault("aof_last_bgrewrite_status") ?? "unknown"
        };
    }

    // Health check'e persistence durumu ekle
    public async Task<bool> IsPersistenceHealthyAsync()
    {
        var status = await GetPersistenceStatusAsync();
        var lastSave = DateTime.UtcNow - status.RdbLastSaveTime;

        // Son 2 saat içinde snapshot alınmamışsa alarm
        return lastSave < TimeSpan.FromHours(2);
    }
}

public class BackupService
{
    private readonly IConnectionMultiplexer _mux;

    public BackupService(IConnectionMultiplexer mux) => _mux = mux;

    public async Task<DateTime> TriggerBackupAsync()
    {
        var server = _mux.GetServers().First();
        await server.SaveAsync(SaveType.BackgroundSave);

        // Son save zamanını al
        var lastSave = await server.LastSaveAsync();
        return lastSave;
    }

    // Health check'te backup freshness kontrolü
    public async Task<bool> IsBackupFreshAsync(TimeSpan maxAge)
    {
        var server = _mux.GetServers().First();
        var lastSave = await server.LastSaveAsync();
        return (DateTime.UtcNow - lastSave) < maxAge;
    }
}

### Automated Backup Verification (CI/CD)

Backup'ın gerçekten restore edilebilir olduğunu otomatik doğrula — aylık manuel test yerine scheduled job.

\`\`\`csharp
// Scheduled backup verification service
// Backup'ı geçici container'a restore eder, key count doğrular
public class BackupVerificationService
{
    private readonly ILogger<BackupVerificationService> _logger;
    private readonly IConfiguration _config;

    public BackupVerificationService(ILogger<BackupVerificationService> logger,
        IConfiguration config)
    {
        _logger = logger;
        _config = config;
    }

    // Haftalık çalıştır (Hangfire, Quartz, veya cron job)
    public async Task<BackupVerificationResult> VerifyLatestBackupAsync()
    {
        // 1. En son backup dosyasını bul (S3/Blob'dan)
        var backupPath = await DownloadLatestBackupAsync();
        if (backupPath is null)
            return new BackupVerificationResult { Success = false, Error = "No backup found" };

        // 2. Testcontainers ile geçici Redis başlat (backup ile)
        var redis = new RedisBuilder()
            .WithImage("redis:8-alpine")
            .WithResourceMapping(backupPath, "/data/dump.rdb")
            .WithCommand("redis-server", "--appendonly", "no")
            .Build();

        try
        {
            await redis.StartAsync();

            using var mux = await ConnectionMultiplexer.ConnectAsync(
                redis.GetConnectionString());
            var server = mux.GetServers().First();
            var db = mux.GetDatabase();

            // 3. Doğrulama kontrolleri
            var dbSize = await server.DatabaseSizeAsync();
            var info = await server.InfoAsync("memory");
            var ping = await db.PingAsync();

            // Key count minimum eşik (production'dan bilinen baseline)
            var minExpectedKeys = long.Parse(
                _config["Backup:MinExpectedKeys"] ?? "1000");

            var result = new BackupVerificationResult
            {
                Success = dbSize >= minExpectedKeys,
                KeyCount = dbSize,
                PingLatency = ping,
                VerifiedAt = DateTime.UtcNow
            };

            if (!result.Success)
                _logger.LogError("Backup verification FAILED: {Keys} keys (expected >={Min})",
                    dbSize, minExpectedKeys);
            else
                _logger.LogInformation("Backup verified OK: {Keys} keys, {Ping}ms ping",
                    dbSize, ping.TotalMilliseconds);

            return result;
        }
        finally
        {
            await redis.DisposeAsync();
        }
    }

    private async Task<string?> DownloadLatestBackupAsync()
    {
        // S3/Blob implementation — projeye göre değişir
        throw new NotImplementedException("Implement per your storage provider");
    }
}

public record BackupVerificationResult
{
    public bool Success { get; init; }
    public long KeyCount { get; init; }
    public TimeSpan PingLatency { get; init; }
    public DateTime VerifiedAt { get; init; }
    public string? Error { get; init; }
}
\`\`\`

public class ApiIntegrationTests : IAsyncLifetime
{
    private readonly RedisContainer _redis = new RedisBuilder()
        .WithImage("redis:8-alpine")
        .Build();

    private HttpClient _client = null!;

        await _redis.StartAsync();

        _factory = new WebApplicationFactory<Program>()
            .WithWebHostBuilder(builder =>
            {
                builder.ConfigureServices(services =>
                {
                    // Production Redis bağlantısını test container ile değiştir
                    services.Remove(services.Single(
                        d => d.ServiceType == typeof(IConnectionMultiplexer)));

                    services.AddSingleton<IConnectionMultiplexer>(
                        ConnectionMultiplexer.Connect(_redis.GetConnectionString()));
                });
            });

        _client = _factory.CreateClient();
    }

    public async Task DisposeAsync()
    {
        _client.Dispose();
        await _factory.DisposeAsync();
        await _redis.DisposeAsync();
    }

    [Fact]
    public async Task GetProduct_Cached_ReturnsFromRedis()
    {
        // İlk istek — DB'den okur, cache'e yazar
        var response1 = await _client.GetAsync("/api/products/1");
        response1.EnsureSuccessStatusCode();

        // İkinci istek — cache'den dönmeli (daha hızlı)
        var sw = Stopwatch.StartNew();
        var response2 = await _client.GetAsync("/api/products/1");
        sw.Stop();

        response2.EnsureSuccessStatusCode();
        var content = await response2.Content.ReadAsStringAsync();
        Assert.Contains("\"id\":1", content);

        // Cache'den geldiğini doğrula: Redis'te key var mı?
        var mux = _factory.Services.GetRequiredService<IConnectionMultiplexer>();
        var db = mux.GetDatabase();
        var cached = await db.StringGetAsync("product:1");
        Assert.True(cached.HasValue);
    }

    [Fact]
    public async Task RateLimit_ExceedsLimit_Returns429()
    {
        // Limit: 5 requests/minute
        for (int i = 0; i < 5; i++)
        {
            var r = await _client.GetAsync("/api/limited-endpoint");
            Assert.Equal(HttpStatusCode.OK, r.StatusCode);
        }

        var blocked = await _client.GetAsync("/api/limited-endpoint");
        Assert.Equal(HttpStatusCode.TooManyRequests, blocked.StatusCode);
    }
}

## Monitoring & Observability 🔴

Production Redis'te neyi izlemeli, nasıl alarm kurmalı.

### Kritik Metrikler

| Metrik | Komut | Alarm Eşiği | Anlamı |
|--------|-------|:-----------:|--------|
| Memory usage | \`INFO memory\` → \`used_memory\` | >%80 maxmemory | Eviction yaklaşıyor |
| Connected clients | \`INFO clients\` → \`connected_clients\` | >%80 maxclients | Connection pool tükeniyor |
| Fragmentation ratio | \`INFO memory\` → \`mem_fragmentation_ratio\` | >1.5 veya <1.0 | Bellek verimsiz / swap |
| Hit rate | \`INFO stats\` → \`keyspace_hits/(hits+misses)\` | <%80 | Cache çalışmıyor |
| Evicted keys | \`INFO stats\` → \`evicted_keys\` | >0/dk artış | Memory yetersiz |
| Blocked clients | \`INFO clients\` → \`blocked_clients\` | >10 | BLPOP/BRPOP bekleme |
| Replication lag | \`INFO replication\` → \`master_repl_offset - slave_repl_offset\` | >1MB | Replica geride |
| Slowlog | \`SLOWLOG LEN\` | Artan trend | Yavaş komutlar |
| Latency | \`redis-cli --latency\` | >1ms p99 | Network/CPU sorunu |

// Custom metrics (Prometheus / OpenTelemetry Metrics)
public class RedisMetricsCollector : BackgroundService
{
    private readonly IConnectionMultiplexer _mux;
    private readonly Meter _meter;
    private readonly ObservableGauge<long> _usedMemory;
    private readonly ObservableGauge<int> _connectedClients;
    private readonly Counter<long> _commandsProcessed;

    public RedisMetricsCollector(IConnectionMultiplexer mux)
    {
        _mux = mux;
        _meter = new Meter("Redis.Monitoring");

        _usedMemory = _meter.CreateObservableGauge("redis.memory.used_bytes",
            () => GetMetric("used_memory"));
        _connectedClients = _meter.CreateObservableGauge("redis.clients.connected",
            () => (int)GetMetric("connected_clients"));
        _commandsProcessed = _meter.CreateCounter<long>("redis.commands.total");
    }

    private long GetMetric(string key)
    {
        try
        {
            var server = _mux.GetServers().First();
            var info = server.Info();
            var section = info.SelectMany(s => s);
            var pair = section.FirstOrDefault(p => p.Key == key);
            return long.TryParse(pair.Value, out var v) ? v : 0;
        }
        catch { return 0; }
    }

    protected override async Task ExecuteAsync(CancellationToken ct)
    {
        while (!ct.IsCancellationRequested)
        {
            await Task.Delay(TimeSpan.FromSeconds(30), ct);
        }
    }
}

\`\`\`yaml
# prometheus/rules/redis-alerts.yml
groups:
  - name: redis.rules
    rules:
      # 1. Memory %80'i aştı — eviction yaklaşıyor
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage >80% ({{ $labels.instance }})"
          description: "Current: {{ $value | humanizePercentage }}. Eviction başlayabilir."

      # 2. Cache hit rate düştü — cache çalışmıyor
      - alert: RedisCacheHitRateLow
        expr: |
          rate(redis_keyspace_hits_total[5m]) /
          (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis hit rate <80% ({{ $labels.instance }})"
          description: "Hit rate: {{ $value | humanizePercentage }}. TTL, key pattern veya cache logic kontrol et."

      # 3. Bağlantı sayısı limiti yaklaştı
      - alert: RedisConnectionsHigh
        expr: redis_connected_clients / redis_config_maxclients > 0.8
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis connections >80% maxclients ({{ $labels.instance }})"

      # 4. Replication lag yüksek
      - alert: RedisReplicationLag
        expr: redis_replication_backlog_bytes > 1048576
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis replication lag >1MB ({{ $labels.instance }})"

## Quick Reference Card

Hangi senaryo → hangi Redis yapısı → hangi .NET metodu? Tek bakışta karar ver.

| Use Case | Redis Yapısı | Temel Komut | .NET Metodu | Bölüm |
|----------|-------------|-------------|-------------|-------|
| Basit cache | String | \`SET key val EX ttl\` | \`StringSetAsync(key, val, ttl)\` | String |
| JSON obje cache | String + JSON | \`SET + GET\` | \`GetOrSetAsync<T>\` veya \`HybridCache\` | Caching |
| Obje field'ları (kısmi update) | Hash | \`HSET / HGET / HGETALL\` | \`HashSetAsync / HashGetAllAsync\` | Hash |
| Sayaç (view, like) | String | \`INCR / INCRBY\` | \`StringIncrementAsync\` | String |
| Queue (FIFO) | List | \`LPUSH / RPOP\` | \`ListLeftPushAsync / ListRightPopAsync\` | List |
| Unique üyelik testi | Set | \`SADD / SISMEMBER\` | \`SetAddAsync / SetContainsAsync\` | Set |
| Leaderboard / sıralama | Sorted Set | \`ZADD / ZREVRANGE\` | \`SortedSetAddAsync / SortedSetRangeByRankAsync\` | Sorted Set |
| Session yönetimi | Hash + TTL | \`HSET + EXPIRE\` | \`HashSetAsync + KeyExpireAsync\` | Session |
| Distributed lock | String NX | \`SET lock NX EX\` | \`StringSetAsync(When.NotExists)\` | Lock |
| Rate limiting | Sorted Set + Lua | \`ZADD + ZREMRANGEBYSCORE\` | \`ScriptEvaluateAsync\` | Rate Limiting |
| Event stream (persistent) | Stream | \`XADD / XREADGROUP\` | \`StreamAddAsync / StreamReadGroupAsync\` | Streams |
| Fire-and-forget notification | Pub/Sub | \`PUBLISH\` | \`PublishAsync\` | Pub/Sub |
| Unique visitor sayımı | HyperLogLog | \`PFADD / PFCOUNT\` | \`HyperLogLogAddAsync / LengthAsync\` | HyperLogLog |
| Yakındaki mağazalar | Geo | \`GEOADD / GEOSEARCH\` | \`GeoAddAsync / GeoSearchAsync\` | Geospatial |
| Hot key koruması | Memory + Redis | — | \`IMemoryCache + IDatabase\` | Client-Side Cache |
| Multi-instance SignalR | Pub/Sub (backplane) | — | \`AddStackExchangeRedis()\` | SignalR |
| HTTP response cache | String (output cache) | — | \`AddStackExchangeRedisOutputCache()\` | Output Cache |
| Atomik multi-komut | Lua Script | \`EVAL / EVALSHA\` | \`ScriptEvaluateAsync\` | Transactions |

    .ct-no { font-family: 'Inter', sans-serif; font-size: 9px; fill: #fb923c; font-weight: 600; }

    </script>
    <script>
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        },
        breaks: false,
        gfm: true
    });

    let currentProvider = 'redis';

    function renderContent() {
        const content = document.getElementById('content');
        content.innerHTML = marked.parse(MARKDOWN_CONTENT);
        convertDetailsToTabs();
        buildToc();
        enhanceBlockquotes();
        styleSectionDividers();
        addCopyButtons();
        document.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
        setupScrollProgress();
    }

    function convertDetailsToTabs() {
        const content = document.getElementById('content');
        const allDetails = content.querySelectorAll('details');
        const processed = new Set();

        allDetails.forEach((detail) => {
            if (processed.has(detail)) return;
            const summary = detail.querySelector('summary');
            if (!summary) return;
            const summaryText = summary.textContent.trim();
            const isRedis = summaryText.includes('Redis CLI') || summaryText.includes('🔴 Redis');
            const isDotnet = summaryText.includes('.NET Core') || summaryText.includes('🟣 .NET');
            if (!isRedis && !isDotnet) return;

            let pair = null;
            let next = detail.nextElementSibling;
            if (next && next.tagName === 'DETAILS') {
                const nextSummary = next.querySelector('summary');
                if (nextSummary) {
                    const nextText = nextSummary.textContent.trim();
                    if ((isRedis && (nextText.includes('.NET') || nextText.includes('🟣'))) ||
                        (isDotnet && (nextText.includes('Redis CLI') || nextText.includes('🔴 Redis')))) {
                        pair = next;
                    }
                }
            }
            if (!pair) { processed.add(detail); return; }
            processed.add(detail);
            processed.add(pair);

            let redisDetail = isRedis ? detail : pair;
            let dotnetDetail = isRedis ? pair : detail;
            const redisContent = getDetailsContent(redisDetail);
            const dotnetContent = getDetailsContent(dotnetDetail);

            const panel = document.createElement('div');
            panel.className = 'tabbed-panel';
            const panelId = 'tab-' + Math.random().toString(36).substr(2, 9);
            panel.innerHTML = '<div class="tab-header">' +
                '<button class="tab-btn ' + (currentProvider === 'redis' ? 'active' : '') + '" data-provider="redis" data-panel="' + panelId + '" onclick="switchTab(this)">Redis CLI / Lua</button>' +
                '<button class="tab-btn ' + (currentProvider === 'dotnet' ? 'active' : '') + '" data-provider="dotnet" data-panel="' + panelId + '" onclick="switchTab(this)">.NET Core</button>' +
                '</div>' +
                '<div class="tab-content ' + (currentProvider === 'redis' ? 'active' : '') + '" data-provider="redis" data-panel="' + panelId + '">' + redisContent + '</div>' +
                '<div class="tab-content ' + (currentProvider === 'dotnet' ? 'active' : '') + '" data-provider="dotnet" data-panel="' + panelId + '">' + dotnetContent + '</div>';

            detail.parentNode.insertBefore(panel, detail);
            detail.remove();
            pair.remove();
            panel.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
        });
    }

    function getDetailsContent(detail) {
        const clone = detail.cloneNode(true);
        const summary = clone.querySelector('summary');
        if (summary) summary.remove();
        return clone.innerHTML;
    }

    function switchTab(btn) {
        const panel = btn.closest('.tabbed-panel');
        const provider = btn.dataset.provider;
        panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        panel.querySelectorAll('.tab-content').forEach(c => {
            c.classList.toggle('active', c.dataset.provider === provider);
        });
    }

    function switchAll(provider) {
        currentProvider = provider;
        document.getElementById('globalRedis').className = provider === 'redis' ? 'active-redis' : '';
        document.getElementById('globalDotnet').className = provider === 'dotnet' ? 'active-dotnet' : '';
        document.querySelectorAll('.tabbed-panel').forEach(panel => {
            panel.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.provider === provider);
            });
            panel.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.dataset.provider === provider);
            });
        });
    }

    function buildToc() {
        const headings = document.querySelectorAll('#content h2');
        const allH3 = document.querySelectorAll('#content h3');
        const tocLinks = document.getElementById('tocLinks');
        const levels = [
            { key: 'basic', label: 'Temel', color: 'var(--green)', cls: 'level-basic' },
            { key: 'mid', label: 'Orta', color: 'var(--yellow)', cls: 'level-mid' },
            { key: 'advanced', label: 'İleri', color: 'var(--orange)', cls: 'level-advanced' },
            { key: 'expert', label: 'Uzman', color: 'var(--red)', cls: 'level-expert' }
        ];
        const groups = { basic: [], mid: [], advanced: [], expert: [], other: [] };
        const h2Array = Array.from(headings);

        headings.forEach((h, i) => {
            const id = 'section-' + i;
            h.id = id;
            let text = h.textContent;
            let levelKey = 'other';
            if (text.includes('\u{1F7E2}')) levelKey = 'basic';
            else if (text.includes('\u{1F7E1}')) levelKey = 'mid';
            else if (text.includes('\u{1F7E0}')) levelKey = 'advanced';
            else if (text.includes('\u{1F534}')) levelKey = 'expert';
            text = text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}]+\s*/gu, '').trim();

            if (levelKey !== 'other') {
                const l = levels.find(x => x.key === levelKey);
                h.innerHTML = text + ' <span class="level-badge ' + l.cls + '">' + l.label + '</span>';
            }

            // Collect h3 sub-items
            const nextH2 = h2Array[i + 1];
            const subH3s = [];
            allH3.forEach(h3 => {
                const isAfter = h.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_FOLLOWING;
                const isBefore = !nextH2 || (nextH2.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_PRECEDING);
                if (isAfter && isBefore) subH3s.push(h3);
            });

            groups[levelKey].push({ id, text, subH3s });
        });

        let html = '';
        groups.other.forEach(item => {
            html += '<a href="#' + item.id + '" onclick="navigateToId(\'' + item.id + '\');return false;" style="padding-left:1rem;font-weight:600">' + item.text + '</a>';
        });
        levels.forEach(level => {
            const items = groups[level.key];
            if (!items.length) return;
            html += '<div class="toc-group"><div class="toc-group-header" onclick="toggleTocGroup(this)"><span class="toc-chevron">\u25BE</span><span class="toc-dot" style="background:' + level.color + '"></span><span>' + level.label + '</span><span class="toc-count">' + items.length + '</span></div><div class="toc-group-items">';
            items.forEach(item => {
                html += '<a href="#' + item.id + '" onclick="navigateToId(\'' + item.id + '\');return false;">' + item.text + '</a>';
                if (item.subH3s.length > 0) {
                    html += '<div class="toc-sub-container">';
                    item.subH3s.forEach((h3, idx) => {
                        const subId = item.id + '-sub-' + (idx + 1);
                        h3.id = subId;
                        html += '<a href="#' + subId + '" class="toc-sub-item" onclick="navigateToId(\'' + subId + '\');return false;">' + h3.textContent + '</a>';
                    });
                    html += '</div>';
                }
            });
            html += '</div></div>';
        });
        tocLinks.innerHTML = html;

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.querySelectorAll('#tocLinks a').forEach(a => {
                        a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id);
                    });
                }
            });
        }, { rootMargin: '-10% 0px -85% 0px' });
        headings.forEach(h => { if (h.id) observer.observe(h); });
        allH3.forEach(h3 => { if (h3.id) observer.observe(h3); });
    }

    function enhanceBlockquotes() {
        document.querySelectorAll('blockquote').forEach(bq => {
            const t = bq.textContent;
            if (t.startsWith('\u{1F4A1}')) bq.classList.add('callout', 'callout-tip');
            else if (t.startsWith('\u26A0') || t.startsWith('\u26A0\uFE0F')) bq.classList.add('callout', 'callout-warn');
            else if (t.startsWith('\u26D4') || t.startsWith('\u274C')) bq.classList.add('callout', 'callout-danger');
        });
    }

    function styleSectionDividers() {
        document.querySelectorAll('#content h1:not(:first-child)').forEach(h1 => {
            const t = h1.textContent;
            if (t.includes('\u{1F7E2}')) h1.classList.add('level-divider-basic');
            else if (t.includes('\u{1F7E1}')) h1.classList.add('level-divider-mid');
            else if (t.includes('\u{1F7E0}')) h1.classList.add('level-divider-advanced');
            else if (t.includes('\u{1F534}')) h1.classList.add('level-divider-expert');
        });
    }

    function addCopyButtons() {
        document.querySelectorAll('#content pre').forEach(pre => {
            if (pre.closest('.code-wrapper')) return;
            const w = document.createElement('div'); w.className = 'code-wrapper';
            pre.parentNode.insertBefore(w, pre); w.appendChild(pre);
            const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = 'Kopyala';
            btn.onclick = () => { const code = pre.querySelector('code'); navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => { btn.textContent = '\u2713 Kopyaland\u0131'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000); }); };
            w.appendChild(btn);
        });
    }

    function toggleTocGroup(h) { h.classList.toggle('collapsed'); h.nextElementSibling.classList.toggle('collapsed'); }
    function navigateToId(id) { if (window.innerWidth <= 1024) document.querySelector('.sidebar').classList.remove('open'); const t = document.getElementById(id); if (t) { history.pushState(null, '', '#' + id); t.scrollIntoView({ behavior: 'smooth', block: 'start' }); } }
    function setupScrollProgress() { const bar = document.getElementById('scrollProgress'); const btn = document.getElementById('backToTop'); window.addEventListener('scroll', () => { const s = window.scrollY; const d = document.documentElement.scrollHeight - window.innerHeight; bar.style.transform = 'scaleX(' + (d > 0 ? s / d : 0) + ')'; btn.classList.toggle('visible', s > 600); }, { passive: true }); }
    function toggleTheme() { const h = document.documentElement; const b = document.getElementById('themeToggle'); const d = h.getAttribute('data-theme') !== 'light'; h.setAttribute('data-theme', d ? 'light' : 'dark'); b.textContent = d ? '\u2600\uFE0F' : '\u{1F319}'; localStorage.setItem('redis-theme', d ? 'light' : 'dark'); }
    (function() { const s = localStorage.getItem('redis-theme'); if (s === 'light') { document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('themeToggle').textContent = '\u2600\uFE0F'; } })();

    // Search
    let searchIndex = [];
    function buildSearchIndex() {
        const sections = document.querySelectorAll('#content h1, #content h2, #content h3');
        searchIndex = [];
        sections.forEach((heading, i) => {
            let textContent = '';
            let el = heading.nextElementSibling;
            const next = sections[i + 1];
            while (el && el !== next) { textContent += ' ' + el.textContent; el = el.nextElementSibling; }
            searchIndex.push({ id: heading.id, title: heading.textContent.replace(/Temel|Orta|İleri|Uzman/g, '').trim(), content: textContent.substring(0, 2000).toLowerCase() });
        });
    }
    let searchTimeout = null;
    function handleSearch(query) {
        clearTimeout(searchTimeout);
        const q = query.trim().toLowerCase();
        const panel = document.getElementById('searchResults');
        filterToc(query);
        if (q.length < 2) { panel.classList.remove('open'); panel.innerHTML = ''; return; }
        searchTimeout = setTimeout(() => {
            const results = [];
            const terms = q.split(/\s+/);
            searchIndex.forEach(item => {
                const titleLower = item.title.toLowerCase();
                const matchesTitle = terms.every(t => titleLower.includes(t));
                const matchesContent = terms.every(t => item.content.includes(t));
                if (matchesTitle || matchesContent) {
                    let snippet = '';
                    if (matchesContent && !matchesTitle) {
                        const idx = item.content.indexOf(terms[0]);
                        const start = Math.max(0, idx - 30);
                        snippet = '...' + item.content.substring(start, start + 80) + '...';
                        terms.forEach(t => { snippet = snippet.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '<mark>$&</mark>'); });
                    }
                    results.push({ ...item, snippet, isTitle: matchesTitle });
                }
            });
            results.sort((a, b) => (b.isTitle ? 1 : 0) - (a.isTitle ? 1 : 0));
            panel.innerHTML = results.length === 0 ? '<div class="search-info">Sonuç bulunamadı</div>' :
                '<div class="search-info">' + results.length + ' sonuç</div>' + results.slice(0, 12).map(r =>
                    '<a href="#' + r.id + '" class="search-result-item" onclick="navigateToId(\'' + r.id + '\');return false;"><span class="result-section">' + r.title + '</span>' + (r.snippet ? '<span class="result-snippet">' + r.snippet + '</span>' : '') + '</a>'
                ).join('');
            panel.classList.add('open');
        }, 200);
    }
    function filterToc(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#tocLinks .toc-group').forEach(group => {
            const links = group.querySelectorAll('a');
            let any = false;
            links.forEach(a => { const m = a.textContent.toLowerCase().includes(q); a.style.display = m || !q ? '' : 'none'; if (m) any = true; });
            group.style.display = (any || !q) ? '' : 'none';
            if (q && any) { group.querySelector('.toc-group-header').classList.remove('collapsed'); group.querySelector('.toc-group-items').classList.remove('collapsed'); }
        });
        document.querySelectorAll('#tocLinks > a').forEach(a => { a.style.display = a.textContent.toLowerCase().includes(q) || !q ? '' : 'none'; });
    }

    document.addEventListener('keydown', e => {
        if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) { e.preventDefault(); document.getElementById('tocSearch').focus(); }
        if (e.key === 'Escape') { const si = document.getElementById('tocSearch'); const p = document.getElementById('searchResults'); si.value = ''; si.blur(); p.classList.remove('open'); p.innerHTML = ''; filterToc(''); }
    });

    document.addEventListener('DOMContentLoaded', () => {
        renderContent();
        setTimeout(() => { buildSearchIndex(); const hash = location.hash.slice(1); if (hash) navigateToId(hash); }, 100);
    });
    </script>
