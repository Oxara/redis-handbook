### Key Naming Conventions

| Kural | Örnek | Açıklama |
|-------|-------|----------|
| Colon separator | \`user:1001:profile\` | Hiyerarşik namespace |
| Lowercase | \`cache:product:123\` | Tutarlılık, case-sensitive hata önleme |
| Kısa ama anlamlı | \`sess:abc123\` | Memory tasarrufu (key name RAM'de tutulur) |
| Prefix ile amaç | \`cache:\`, \`lock:\`, \`queue:\`, \`rate:\` | Hangi pattern'a ait olduğu belli |
| ID son segment | \`order:5432\` | SCAN pattern: \`order:*\` |
| Hash tag (Cluster) | \`{user:1001}:profile\` | Aynı slot'a düşür, multi-key ops |
| TTL ipucu (opsiyonel) | \`tmp:import:batch42\` | Geçici key olduğu belli |

sess:abc123                   # session hash

// ✅ DOĞRU: Tek Singleton multiplexer'dan farklı IDatabase al
public class MultiDbService
{
    private readonly IDatabase _cacheDb;     // db0 — genel cache
    private readonly IDatabase _sessionDb;   // db1 — session
    private readonly IDatabase _queueDb;     // db2 — queue/stream

    public MultiDbService(IConnectionMultiplexer mux)
    {
        // GetDatabase(n) yeni TCP bağlantısı AÇMAZ.
        // IDatabase lightweight struct'tır — GC pressure yok.
        // Aynı multiplexed TCP connection üzerinden çalışır.
        _cacheDb = mux.GetDatabase(0);
        _sessionDb = mux.GetDatabase(1);
        _queueDb = mux.GetDatabase(2);
    }

    public async Task<string?> GetCacheAsync(string key)
        => await _cacheDb.StringGetAsync(key);

    public async Task SetSessionAsync(string sessionId, string data)
        => await _sessionDb.StringSetAsync($"session:{sessionId}", data, TimeSpan.FromMinutes(30));

    public async Task EnqueueAsync(string message)
        => await _queueDb.ListLeftPushAsync("tasks", message);
}

### Kullanım Önerileri

| DB | Kullanım | Neden Ayrı DB |
|----|----------|---------------|
| **db0** | Genel cache (product, config) | Varsayılan, FLUSHDB güvenli |
| **db1** | Session verileri | Bağımsız TTL/flush |
| **db2** | Queue / Streams | İzole FLUSHDB |
| **db3** | Rate limiting | Hızlı sıfırlama |
| **db4–15** | Test / staging / geçici | Dev ortamında izolasyon |

> ⚠️ **Limitasyonlar — db0 dışı ne zaman KULLANILMAZ:**
> - **Redis Cluster** → Sadece db0 desteklenir. SELECT komutu hata verir.
> - **Redis Sentinel** → Sentinel konfigürasyonu sadece db0'ı monitor eder. Failover sonrası diğer DB'ler garanti değildir.
> - **AWS ElastiCache / Azure Cache for Redis** → Cluster mode aktifse sadece db0. Non-cluster modda db0–15 kullanılabilir.
> - **Master-Replica (read replica)** → Tüm DB'ler replicate olur ama bazı cloud provider'lar kısıtlama koyar.
> - **Pub/Sub** → Channel'lar DB'den bağımsızdır — db3'te PUBLISH yapsan da tüm subscriber'lar (herhangi db'de) alır.
> - Tüm DB'ler aynı **memory pool**'u paylaşır — ayrı maxmemory atanamaz.
> - Redis author Antirez: *"Multiple DBs are a legacy feature, use namespaces instead."*

> ⚠️ **SELECT Overhead & Performans:**
> - \`GetDatabase(n)\` her komut öncesine **SELECT n** ekler (defaultDatabase dışındaki DB'ler için).
> - Bu ekstra komut: +1 roundtrip değil (pipeline'da gider) ama +14 byte bandwidth/komut.
> - defaultDatabase ile eşleşen DB'ye \`GetDatabase()\` çağrısında SELECT gönderilmez → sıfır overhead.
> - **Sonuç:** Yoğun trafikte (>100K ops/s) farklı DB kullanıyorsan, en çok kullanılan DB'yi \`defaultDatabase\` olarak ayarla.

> ⛔ **Kural:** Production'da Cluster/Sentinel/Cloud Redis kullanıyorsan **her zaman db0 + key prefix** ile çalış. Multi-DB kullanımı yalnızca standalone single-instance dev/test ortamında güvenlidir.

> 💡 **Öneri:** Key prefix ile namespace: \`cache:product:123\`, \`session:abc\`, \`queue:emails\`. Bu yaklaşım Cluster'a geçişte sıfır değişiklik gerektirir.

public class StringOperationsService
{
    private readonly IDatabase _redis;

    public StringOperationsService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // Temel CRUD
    public async Task BasicCrudAsync()
    {
        await _redis.StringSetAsync("user:1:name", "Erdem");
        string? name = await _redis.StringGetAsync("user:1:name");
        await _redis.KeyDeleteAsync("user:1:name");
    }

    // TTL ile cache
    public async Task SetWithTtlAsync(string key, string value, TimeSpan expiry)
    {
        await _redis.StringSetAsync(key, value, expiry);
    }

    // Conditional set (distributed lock temeli)
    public async Task<bool> TryAcquireLockAsync(string resource, string owner, TimeSpan expiry)
    {
        return await _redis.StringSetAsync(
            $"lock:{resource}", owner, expiry, When.NotExists);
    }

    // Batch (roundtrip azaltır)
    public async Task BatchSetAsync(Dictionary<string, string> pairs)
    {
        var entries = pairs.Select(p =>
            new KeyValuePair<RedisKey, RedisValue>(p.Key, p.Value)).ToArray();
        await _redis.StringSetAsync(entries);
    }

    // Atomik sayaç
    public async Task<long> IncrementAsync(string key, long amount = 1)
    {
        return await _redis.StringIncrementAsync(key, amount);
    }

    // JSON serialize ile obje cache
    public async Task<T?> GetOrSetAsync<T>(string key, Func<Task<T>> factory, TimeSpan ttl)
    {
        var cached = await _redis.StringGetAsync(key);
        if (cached.HasValue)
        {
            try
            {
                return JsonSerializer.Deserialize<T>(cached!);
            }
            catch (JsonException)
            {
                // Corrupt/incompatible data — sil ve yeniden üret
                await _redis.KeyDeleteAsync(key);
            }
        }

        var value = await factory();
        if (value is not null)
            await _redis.StringSetAsync(key,
                JsonSerializer.Serialize(value), ttl);
        return value;
    }
}
\`\`\`

</details>

> ⚠️ **StringSet vs IDistributedCache:** StackExchange.Redis doğrudan kullanımda her Redis komutuna erişirsin. \`IDistributedCache\` ise sadece \`Get/Set/Remove\` sunar — başka provider'a geçiş kolaylığı sağlar ama Redis'in gücünü kısıtlar.

> ⚠️ **Cache Stampede:** Yukarıdaki \`GetOrSetAsync\` basit implementasyondur. Yoğun trafikte aynı key için eşzamanlı N request gelirse hepsi cache miss yaşar → N kez DB'ye gider. Çözüm: lock-based double-check pattern (Caching Patterns bölümündeki \`GetWithStampedeProtectionAsync\` örneğine bak).

public class UserCacheService
{
    private readonly IDatabase _redis;

    public UserCacheService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task SetUserAsync(int userId, UserDto user)
    {
        var key = $"user:{userId}";
        var entries = new HashEntry[]
        {
            new("name", user.Name),
            new("email", user.Email),
            new("age", user.Age.ToString()),
            new("updatedAt", DateTime.UtcNow.Ticks.ToString())
        };
        await _redis.HashSetAsync(key, entries);
        await _redis.KeyExpireAsync(key, TimeSpan.FromHours(1));
    }

    public async Task<UserDto?> GetUserAsync(int userId)
    {
        var key = $"user:{userId}";
        var entries = await _redis.HashGetAllAsync(key);
        if (entries.Length == 0) return null;

        var dict = entries.ToDictionary(
            e => e.Name.ToString(),
            e => e.Value.ToString());

        return new UserDto
        {
            Name = dict.GetValueOrDefault("name") ?? "",
            Email = dict.GetValueOrDefault("email") ?? "",
            Age = int.TryParse(dict.GetValueOrDefault("age"), out var a) ? a : 0
        };
    }

    // Tek field güncelle (full obje yazmaya gerek yok)
    public async Task UpdateFieldAsync(int userId, string field, string value)
    {
        await _redis.HashSetAsync($"user:{userId}", field, value);
    }

    // Atomik sayaç (login count gibi)
    public async Task<long> IncrementFieldAsync(int userId, string field, long amount = 1)
    {
        return await _redis.HashIncrementAsync($"user:{userId}", field, amount);
    }
}

public class QueueService
{
    private readonly IDatabase _redis;

    public QueueService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task EnqueueAsync(string queue, string message)
    {
        await _redis.ListLeftPushAsync($"queue:{queue}", message);
    }

    public async Task<string?> DequeueAsync(string queue)
    {
        var value = await _redis.ListRightPopAsync($"queue:{queue}");
        return value.HasValue ? value.ToString() : null;
    }

    // Reliable queue: pop + push to processing list
    public async Task<string?> ReliableDequeueAsync(string queue)
    {
        var value = await _redis.ListRightPopLeftPushAsync(
            $"queue:{queue}", $"processing:{queue}");
        return value.HasValue ? value.ToString() : null;
    }

    public async Task AcknowledgeAsync(string queue, string message)
    {
        await _redis.ListRemoveAsync($"processing:{queue}", message);
    }

    public async Task<long> GetLengthAsync(string queue)
    {
        return await _redis.ListLengthAsync($"queue:{queue}");
    }
}

        await _redis.SortedSetAddAsync(Key, playerId, score);
    }

    public async Task<double> IncrementScoreAsync(string playerId, double amount)
    {
        return await _redis.SortedSetIncrementAsync(Key, playerId, amount);
    }

    public async Task<List<LeaderboardEntry>> GetTopAsync(int count = 10)
    {
        var entries = await _redis.SortedSetRangeByRankWithScoresAsync(
            Key, 0, count - 1, Order.Descending);

        return entries.Select((e, i) => new LeaderboardEntry
        {
            Rank = i + 1,
            PlayerId = e.Element.ToString(),
            Score = e.Score
        }).ToList();
    }

    public async Task<long?> GetRankAsync(string playerId)
    {
        // ZRevRank: 0-based descending
        return await _redis.SortedSetRankAsync(Key, playerId, Order.Descending);
    }

    public async Task<double?> GetScoreAsync(string playerId)
    {
        return await _redis.SortedSetScoreAsync(Key, playerId);

# 🟡 ORTA

## Caching Patterns 🟡

### Ne Zaman Redis Cache Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Sık okunan, nadir değişen veri (ürün kataloğu, config) | Her request'te değişen veri (anlık stok, canlı teklif) | **E-ticaret:** Ürün detay sayfası — günde 100K hit, DB'den 50ms, Redis'ten 0.3ms |
| Pahalı hesaplama sonuçları (rapor, aggregation) | Küçük ve hızlı sorgular (indexed PK lookup <2ms) | **Fintech:** Günlük portföy özeti — hesaplama 3s, cache'ten anında |
| Session, token, rate limit state | ACID garantisi gereken veri (bakiye, sipariş durumu) | **SaaS:** User permission cache — JWT decode'dan hızlı |
| Multi-instance paylaşımlı state | Tek instance uygulama + in-memory yeterli | **Startup:** 1 pod'lu API → \`IMemoryCache\` yeter, Redis overhead gereksiz |

> ⚠️ **Anti-pattern:** "Her şeyi cache'le" yaklaşımı memory şişirir, invalidation karmaşıklaşır, stale data riski artar. **Önce ölç** — sadece P95 > 50ms olan ve hit ratio > 80% olacak endpoint'leri cache'le.

> 💡 **Gerçek hayat senaryosu — E-ticaret ürün sayfası:** Ürün bilgisi (ad, açıklama, görseller) nadiren değişir → **Cache-Aside, TTL 5dk**. Stok bilgisi saniyede değişir → **cache'leme, event-driven invalidation** veya kısa TTL (10s). Fiyat kampanya ile değişir → **Write-Through** (admin panelden güncelleme anında cache'i de yaz).

### Cache-Aside (Lazy Loading)

En yaygın pattern. İlk istek DB'den okur ve cache'e yazar. Sonrakiler cache'den döner.

public class CachedProductRepository : IProductRepository
{
    private readonly IProductRepository _inner;
    private readonly IDatabase _redis;
    private readonly TimeSpan _ttl = TimeSpan.FromMinutes(15);

    public CachedProductRepository(IProductRepository inner, IConnectionMultiplexer mux)
    {
        _inner = inner;
        _redis = mux.GetDatabase();
    }

    public async Task<Product?> GetByIdAsync(int id, CancellationToken ct = default)
    {
        var key = $"product:{id}";

        // 1. Cache'den oku
        var cached = await _redis.StringGetAsync(key);
        if (cached.HasValue)
            return JsonSerializer.Deserialize<Product>(cached!);

        // 2. DB'den oku
        var product = await _inner.GetByIdAsync(id, ct);
        if (product is null) return null;

        // 3. Cache'e yaz
        await _redis.StringSetAsync(key,
            JsonSerializer.Serialize(product), _ttl);

        return product;
    }

    public async Task UpdateAsync(Product product, CancellationToken ct = default)
    {
        await _inner.UpdateAsync(product, ct);

        // Cache invalidation (write-through alternatifi)
        await _redis.KeyDeleteAsync($"product:{product.Id}");
    }
}

// DI kayıt (Scrutor decorator)
builder.Services.AddScoped<IProductRepository, ProductRepository>();
builder.Services.Decorate<IProductRepository, CachedProductRepository>();

public async Task<T?> GetWithStampedeProtectionAsync<T>(
    string key, Func<Task<T?>> factory, TimeSpan ttl) where T : class
{
    // 1. Cache hit?
    var cached = await _redis.StringGetAsync(key);
    if (cached.HasValue)
        return JsonSerializer.Deserialize<T>(cached!);

    // 2. Lock al
    var lockKey = $"lock:{key}";
    var acquired = await _redis.StringSetAsync(
        lockKey, "1", TimeSpan.FromSeconds(10), When.NotExists);

    if (acquired)
    {
        try
        {
            // Double-check (başka thread yazmış olabilir)
            cached = await _redis.StringGetAsync(key);
            if (cached.HasValue)
                return JsonSerializer.Deserialize<T>(cached!);

            var value = await factory();
            if (value is not null)
                await _redis.StringSetAsync(key,
                    JsonSerializer.Serialize(value), ttl);
            return value;
        }
        finally
        {
            await _redis.KeyDeleteAsync(lockKey);
        }
    }

    // 3. Lock alınamadı → kısa bekle ve retry
    await Task.Delay(50);
    cached = await _redis.StringGetAsync(key);
    return cached.HasValue ? JsonSerializer.Deserialize<T>(cached!) : null;
}

### Cache Invalidation Stratejileri

| Strateji | Ne zaman | Avantaj | Dezavantaj |
|----------|----------|---------|-----------|
| **TTL-based** | Read-heavy, stale OK | Basit | Stale window |
| **Event-based** | Write sonrası DEL | Tutarlı | Karmaşıklık |
| **Write-through** | Her write'da cache güncelle | Tutarlı | Write yavaşlar |
| **Tag-based** | Grup invalidation | Esnek | İmplementasyon zor |

public class ProductService

    public async Task<Product?> GetProductAsync(int id, CancellationToken ct = default)

            {

            },

### Serialization Stratejisi

Cache'e yazarken serialization formatı throughput'u doğrudan etkiler. Yanlış seçim %40+ latency artışı yapabilir.

| Format | NuGet | Boyut (1KB obj) | Serialize | Deserialize | Human-readable |
|--------|-------|:------:|:---------:|:-----------:|:-:|
| **System.Text.Json** | Built-in | ~1.2KB | ~2.5μs | ~3.0μs | ✅ |
| **MessagePack** | MessagePack | ~0.7KB | ~0.8μs | ~0.9μs | ❌ |
| **MemoryPack** | MemoryPack | ~0.5KB | ~0.3μs | ~0.4μs | ❌ |
| **protobuf-net** | protobuf-net | ~0.6KB | ~1.0μs | ~1.2μs | ❌ |

\`\`\`csharp
// MessagePack ile Redis cache — %60 daha az bandwidth, 3× hızlı serialize
// NuGet: dotnet add package MessagePack
using MessagePack;

[MessagePackObject]
public class Product
{
    [Key(0)] public int Id { get; set; }
    [Key(1)] public string Name { get; set; } = "";
    [Key(2)] public decimal Price { get; set; }
}

public class MessagePackCacheService
{
    private readonly IDatabase _redis;

    public MessagePackCacheService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task SetAsync<T>(string key, T value, TimeSpan ttl)
    {
        var bytes = MessagePackSerializer.Serialize(value);
        await _redis.StringSetAsync(key, bytes, ttl);
    }

    public async Task<T?> GetAsync<T>(string key)
    {
        var bytes = await _redis.StringGetAsync(key);
        if (!bytes.HasValue) return default;
        return MessagePackSerializer.Deserialize<T>(bytes!);
    }
}
\`\`\`

> ⚠️ **Ne zaman binary format?** >10K ops/s veya value >10KB ise MessagePack/MemoryPack ciddi fark yaratır. <1K ops/s'de System.Text.Json yeterli — debug kolaylığı (redis-cli ile okunabilir value) daha değerli.

### Provider Karşılaştırması — Caching Özelinde

| Özellik | **AWS ElastiCache** | **Azure Cache for Redis** | **Self-Hosted** |
|---------|-------------------|--------------------------|-----------------|
| Max node memory | 635 GB (r7g.16xlarge) | 120 GB (P5) | Donanıma bağlı |
| Cluster mode | Evet (15 shard × 5 replica) | Evet (10 shard) | Evet (sınırsız) |
| Multi-AZ failover | Otomatik (<30s) | Otomatik | Manuel Sentinel/Cluster |
| TLS overhead | ~%5-10 latency | Varsayılan açık, zorunlu | Opsiyonel |
| \`KEYS\`/\`FLUSHALL\` | Açık (dikkat!) | Açık | Açık |
| Data tiering (SSD) | ❌ | Enterprise Flash ✅ | Redis on Flash (Enterprise) |
| Backup | Günlük snapshot (S3) | RDB export (her 1-12h) | Manuel RDB/AOF |
| \`maxmemory-policy\` default | volatile-lru | volatile-lru | noeviction |
| Connection limit | Node tipine bağlı (65K) | Tier'a bağlı (P5: 40K) | OS limit |
| Monitoring | CloudWatch metrics | Azure Monitor + Redis Insights | Prometheus + Grafana |

> ⚠️ **Provider-specific pitfall — Azure:** \`Azure Cache Basic/Standard\` tier'da **cluster yok**, tek node. Failover sırasında 15-30s downtime olur. Caching layer'ınız HA gerektiriyorsa **minimum Premium** tier kullanın.

> ⚠️ **Provider-specific pitfall — AWS:** ElastiCache **VPC-only** — Lambda'dan erişim için NAT Gateway veya VPC Lambda gerekir. Her bağlantı ENI tüketir.

> 💡 **Gerçek hayat kararı — Startup:** Self-hosted Redis ile başla (Docker, 0 maliyet). İlk 10K DAU'ya kadar yeterli. Sonra managed service'e geçmek 1 saat sürer (connection string değişikliği).

### Ne Zaman Pub/Sub Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Anlık bildirim (mesaj kaybı tolere edilebilir) | Mesaj kaybı kabul edilemez (ödeme, sipariş) | **Chat app:** Online kullanıcılara anlık mesaj — offline'daysa zaten göremez |
| Cache invalidation broadcast (tüm instance'lara) | Guaranteed delivery gerekli | **Microservice:** 8 pod'a "ürün güncellendi, cache'i temizle" sinyali |
| Realtime dashboard, live feed | Consumer geçici olarak kapanabiliyorsa | **Monitoring:** CPU/memory metrik'lerini dashboard'a push |
| SignalR backplane (multi-instance) | Queue semantiği (FIFO, retry, DLQ) | **E-ticaret:** Stok değişiklik bildirimi — kayıpsa sorun yok, 2s sonra refresh gelir |

> ⚠️ **KRİTİK:** Pub/Sub **at-most-once** garantisi verir. Subscriber bağlı değilse mesaj **kalıcı olarak kaybolur**. Ödeme tamamlandı eventi, sipariş oluşturuldu — bunlar için **asla Pub/Sub kullanma**, Redis Streams veya RabbitMQ/Kafka tercih et.

> 💡 **Gerçek hayat senaryosu — Canlı bildirim sistemi:** Kullanıcı online → Pub/Sub ile anlık push. Kullanıcı offline → mesajı DB'ye yaz + Streams'e ekle. Online'a döndüğünde Streams'ten unread mesajları çek. Hibrit mimari: Pub/Sub (hız) + Streams (güvenilirlik).

public class NotificationService
{
    private readonly ISubscriber _subscriber;
    private readonly IDatabase _redis;

    public NotificationService(IConnectionMultiplexer mux)
    {
        _subscriber = mux.GetSubscriber();
        _redis = mux.GetDatabase();
    }

    // Publish
    public async Task PublishAsync(string userId, object notification)
    {
        var channel = RedisChannel.Literal($"notifications:{userId}");
        var message = JsonSerializer.Serialize(notification);
        await _subscriber.PublishAsync(channel, message);
    }

    // Subscribe (genellikle BackgroundService'de)
    public async Task SubscribeAsync(string userId, Action<string> handler)
    {
        var channel = RedisChannel.Literal($"notifications:{userId}");
        await _subscriber.SubscribeAsync(channel, (ch, msg) =>
        {
            if (msg.HasValue)
                handler(msg.ToString());
        });
    }

    // Pattern subscribe
    public async Task SubscribePatternAsync(Action<string, string> handler)
    {
        var pattern = RedisChannel.Pattern("notifications:*");
        await _subscriber.SubscribeAsync(pattern, (ch, msg) =>
        {
            handler(ch.ToString(), msg.ToString());
        });
    }

    public async Task UnsubscribeAsync(string userId)
    {
        var channel = RedisChannel.Literal($"notifications:{userId}");
        await _subscriber.UnsubscribeAsync(channel);
    }
}

## Redis Streams 🟡

Persistent, consumer group destekli event stream. Kafka-light.

### Ne Zaman Streams Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Mesaj kaybı kabul edilemez + Redis zaten varsa | Günlük milyonlarca event + uzun retention (>7 gün) | **Sipariş:** order_created → payment → shipment event zinciri |
| Consumer group ile iş dağıtımı (competing consumers) | Partition-level ordering + exactly-once gerekli | **Bildirim:** 3 worker arasında push notification işlemlerini paylaştır |
| Event replay gerekli (yeni consumer eski event'leri alsın) | Multi-region replication + schema registry gerekli | **Audit:** Yeni "fraud-detection" servisini deploy et → tüm geçmiş siparişleri replay et |
| Küçük-orta ölçek (<100K msg/s) | Yüksek throughput (>500K msg/s) → Kafka/Pulsar | **Startup:** RabbitMQ/Kafka cluster yönetmeden event-driven mimari kur |

> ⚠️ **Streams ≠ Kafka:** Redis Streams tek node memory'sinde yaşar (cluster'da shard başına). 10M+ mesaj birikirse memory patlar. \`MAXLEN ~10000\` veya \`MINID\` ile trim zorunlu. Kafka: disk-based, TB'larca retention ucuz.

> 💡 **Gerçek hayat senaryosu — Sipariş işleme pipeline'ı:** \`XADD orders:stream\` → 3 consumer group: (1) \`payment-svc\` ödemeyi başlatır, (2) \`inventory-svc\` stok düşer, (3) \`notification-svc\` kullanıcıya e-posta atar. Her biri bağımsız ACK eder. Biri çökerse \`XAUTOCLAIM\` ile başka worker devralır. Dead letter'a 5 retry sonrası taşınır.

public class OrderStreamProducer
{
    private readonly IDatabase _redis;
    private const string StreamKey = "orders:stream";

    public OrderStreamProducer(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<string> PublishOrderEventAsync(string eventType, int orderId, int userId)
    {
        var messageId = await _redis.StreamAddAsync(StreamKey, new NameValueEntry[]
        {
            new("event_type", eventType),
            new("order_id", orderId.ToString()),
            new("user_id", userId.ToString()),
            new("timestamp", DateTimeOffset.UtcNow.ToUnixTimeMilliseconds().ToString())
        });
        return messageId.ToString();
    }
}

public class OrderStreamConsumer : BackgroundService
{
    private readonly IConnectionMultiplexer _mux;
    private readonly ILogger<OrderStreamConsumer> _logger;
    private const string StreamKey = "orders:stream";
    private const string GroupName = "payment-svc";
    private readonly string _consumerName;

    public OrderStreamConsumer(IConnectionMultiplexer mux, ILogger<OrderStreamConsumer> logger)
    {
        _mux = mux;
        _logger = logger;
        _consumerName = $"worker-{Environment.MachineName}";
    }

    protected override async Task ExecuteAsync(CancellationToken ct)
    {
        var db = _mux.GetDatabase();

        // Consumer group oluştur (idempotent)
        try
        {
            await db.StreamCreateConsumerGroupAsync(StreamKey, GroupName, "0", createStream: true);
        }
        catch (RedisServerException ex) when (ex.Message.Contains("BUSYGROUP"))
        {
            // Zaten var — sorun yok
        }

        while (!ct.IsCancellationRequested)
        {
            try
            {
                var entries = await db.StreamReadGroupAsync(
                    StreamKey, GroupName, _consumerName,
                    position: ">", count: 10);

                if (entries.Length == 0)
                {
                    await Task.Delay(1000, ct);
                    continue;
                }

                foreach (var entry in entries)
                {
                    try
                    {
                        await ProcessMessageAsync(entry);
                        await db.StreamAcknowledgeAsync(StreamKey, GroupName, entry.Id);
                    }
                    catch (Exception ex)
                    {
                        _logger.LogError(ex, "Failed to process {Id}", entry.Id);
                        // ACK yapma → XPENDING'de kalır → retry/dead-letter
                    }
                }
            }
            catch (Exception ex) when (!ct.IsCancellationRequested)
            {
                _logger.LogError(ex, "Stream read error");
                await Task.Delay(5000, ct);
            }
        }
    }

    private Task ProcessMessageAsync(StreamEntry entry)
    {
        var values = entry.Values.ToDictionary(v => v.Name.ToString(), v => v.Value.ToString());
        _logger.LogInformation("Processing {EventType} for order {OrderId}",
            values["event_type"], values["order_id"]);
        return Task.CompletedTask;
    }
}

| **Consumer Groups** | Yok | Evet |

| **Delivery** | At-most-once | At-least-once |

| **Blocking read** | Evet | Evet |
| **Back-pressure** | Yok | XLEN + trim |

# Pending mesajların retry sayısını gör
# XPENDING stream group - + 10 consumer
XPENDING orders:stream payment-svc - + 10
# <id> <consumer> <idle-ms> <delivery-count>

# 3+ kez denenmiş mesajları claim et (XAUTOCLAIM — Redis 6.2+)

# Idle >60s olan mesajları dlq-worker'a ata

# Dead letter'a taşı (Lua ile)
EVAL "
    local pending = redis.call('XPENDING', KEYS[1], ARGV[1], '-', '+', '100')
    for _, msg in ipairs(pending) do
        if tonumber(msg[4]) >= tonumber(ARGV[2]) then
            local data = redis.call('XRANGE', KEYS[1], msg[1], msg[1])
            if #data > 0 then
                redis.call('XADD', KEYS[2], '*', unpack(data[1][2]))
                redis.call('XACK', KEYS[1], ARGV[1], msg[1])
            end
        end
    end
" 2 orders:stream orders:dead-letter payment-svc 3

\`\`\`csharp
public class DeadLetterProcessor
{
    private readonly IDatabase _redis;
    private readonly ILogger<DeadLetterProcessor> _logger;
    private const string StreamKey = "orders:stream";
    private const string DeadLetterKey = "orders:dead-letter";
    private const string GroupName = "payment-svc";
    private const int MaxRetries = 3;

    public DeadLetterProcessor(IConnectionMultiplexer mux,
        ILogger<DeadLetterProcessor> logger)
    {
        _redis = mux.GetDatabase();
        _logger = logger;
    }

    // Periyodik: retry count aşılan mesajları dead letter'a taşı
    public async Task ProcessPendingAsync(CancellationToken ct)
    {
        var pending = await _redis.StreamPendingMessagesAsync(
            StreamKey, GroupName, count: 50, RedisValue.Null);

        foreach (var msg in pending)
        {
            if (msg.DeliveryCount >= MaxRetries)
            {
                // Dead letter queue'ya kopyala
                var entries = await _redis.StreamRangeAsync(
                    StreamKey, msg.MessageId, msg.MessageId, count: 1);

                if (entries.Length > 0)
                {
                    await _redis.StreamAddAsync(DeadLetterKey, entries[0].Values);
                    await _redis.StreamAcknowledgeAsync(StreamKey, GroupName, msg.MessageId);
                    _logger.LogWarning(
                        "Message {Id} moved to dead letter after {Count} retries",
                        msg.MessageId, msg.DeliveryCount);
                }
            }
            else if (msg.IdleTimeInMilliseconds > 60_000)
            {
                // 60s+ idle → başka worker'a ata (XCLAIM)
                await _redis.StreamClaimAsync(StreamKey, GroupName,
                    Environment.MachineName, 60_000,
                    new[] { msg.MessageId });
            }
        }
    }
}
\`\`\`

</details>

## Transactions & Lua Scripting 🟡

### Ne Zaman MULTI/EXEC vs Lua Kullan

| Senaryo | MULTI/EXEC | Lua Script | Neden |
|---------|:----------:|:----------:|-------|
| Basit multi-set (bağımsız yazımlar) | ✅ | ❌ | Lua overhead gereksiz, MULTI yeterli |
| Conditional logic (if/else, hesaplama) | ❌ | ✅ | MULTI içinde koşul yazılamaz |
| Read → compute → write (atomik) | ❌ | ✅ | MULTI içinde GET sonucu kullanılamaz |
| Optimistic lock (WATCH + retry) | ✅ | ❌ | WATCH semantiği tam uyumlu |
| Rate limiter, sliding window | ❌ | ✅ | ZREMRANGEBYSCORE + ZADD + PEXPIRE atomik olmalı |
| Inventory decrement (stok > 0 ise düş) | ❌ | ✅ | Read-check-write atomik olmalı |

> ⚠️ **MULTI/EXEC ≠ Rollback:** Redis transaction'ları SQL gibi rollback yapmaz. EXEC içindeki komutlardan biri hata verirse diğerleri yine çalışır. "Ya hep ya hiç" sadece **çalıştırma garantisi** — hata geri alınmaz. Gerçek atomik iş mantığı için **Lua kullan**.

> 💡 **Gerçek hayat senaryosu — Envanter düşürme:** Stok son 3 birim, 5 kullanıcı aynı anda sepete ekliyor. MULTI/EXEC ile: WATCH yaparsın ama yüksek contention'da sürekli retry → performans düşer. **Lua ile:** \`if tonumber(redis.call('GET', KEYS[1])) >= qty then redis.call('DECRBY', KEYS[1], qty); return 1 end; return 0\` — tek roundtrip, atomik, retry gereksiz.

### MULTI/EXEC (Optimistic Locking)

<details>

WATCH user:1:balance
MULTI
DECRBY user:1:balance 200
INCRBY user:2:balance 200
EXEC
# WATCH'taki key değiştiyse EXEC nil döner (retry gerekir)

public class TransferService
{
    private readonly IDatabase _redis;

    public TransferService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<bool> TransferAsync(string fromUser, string toUser, long amount)
    {
        var tran = _redis.CreateTransaction();

        // Condition: balance değişmemişse devam et
        tran.AddCondition(Condition.StringGreaterThan($"user:{fromUser}:balance", amount - 1));

        _ = tran.StringDecrementAsync($"user:{fromUser}:balance", amount);
        _ = tran.StringIncrementAsync($"user:{toUser}:balance", amount);

        return await tran.ExecuteAsync(); // false → condition failed
    }
}

### Lua Script (Atomik Operasyonlar)

<details>
<summary><b>🔴 Redis CLI</b></summary>

\`\`\`lua
-- Rate limiter (sliding window)
EVAL "
    local key = KEYS[1]
    local limit = tonumber(ARGV[1])
    local window = tonumber(ARGV[2])
    local now = tonumber(ARGV[3])
    redis.call('ZREMRANGEBYSCORE', key, 0, now - window)
    local count = redis.call('ZCARD', key)
    if count < limit then
        redis.call('ZADD', key, now, now .. ':' .. math.random(1000000))
        redis.call('PEXPIRE', key, window)
        return 1
    end
    return 0
" 1 rate:api:user:1001 100 60000 1716825600000

public class LuaScriptService
{
    private readonly IDatabase _redis;

    // Script'i bir kez hazırla, SHA ile çağır (bandwidth tasarrufu)
    private static readonly LuaScript _rateLimitScript = LuaScript.Prepare(@"
        local key = @key
        local limit = tonumber(@limit)
        local window = tonumber(@window)
        local now = tonumber(@now)
        redis.call('ZREMRANGEBYSCORE', key, 0, now - window)
        local count = redis.call('ZCARD', key)
        if count < limit then
            redis.call('ZADD', key, now, now .. ':' .. math.random(1000000))
            redis.call('PEXPIRE', key, window)
            return 1
        end
        return 0
    ");

    public LuaScriptService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<bool> IsAllowedAsync(string clientId, int limit = 100, int windowMs = 60000)
    {
        var result = await _redis.ScriptEvaluateAsync(_rateLimitScript, new
        {
            key = (RedisKey)$"rate:{clientId}",
            limit,
            window = windowMs,
            now = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds()
        });
        return (int)result == 1;
    }
}
\`\`\`

</details>

> 💡 **Lua atomik çalışır** — script sırasında başka komut araya giremez. Ama uzun script = tüm Redis'i bloklar. Kısa tut (<5ms).

### Script Caching (EVALSHA)

Her \`EVAL\` çağrısında Redis script'i SHA1'e compile eder. Production'da \`SCRIPT LOAD\` + \`EVALSHA\` ile compile maliyetini sıfırla.

<details>
<summary><b>🔴 Redis CLI</b></summary>

\`\`\`bash
# 1. Script'i yükle (SHA1 döner)
SCRIPT LOAD "return redis.call('INCR', KEYS[1])"
# "e0e1f9fabfc9d4800c877a703b823ac0578ff831"

# 2. SHA ile çalıştır (compile yok → hızlı)
EVALSHA e0e1f9fabfc9d4800c877a703b823ac0578ff831 1 mycounter

# Script var mı kontrol
SCRIPT EXISTS e0e1f9fabfc9d4800c877a703b823ac0578ff831

# Tüm script cache'i temizle (failover sonrası otomatik olur)
SCRIPT FLUSH

// StackExchange.Redis LuaScript.Prepare() otomatik EVALSHA kullanır.
// İlk çalıştırmada EVALSHA dener, script yoksa otomatik EVAL yapar ve cache'ler.
// Manuel kontrol gerekmez — kütüphane yönetir.

// Ancak LoadedLuaScript ile açıkça preload yapabilirsin:
private static readonly LuaScript _script = LuaScript.Prepare(@"
    local current = redis.call('INCRBY', @key, @amount)
    if current == tonumber(@amount) then
        redis.call('EXPIRE', @key, @ttl)
    end
    return current
");

// Startup'ta server'a yükle (SHA cache'le)
private LoadedLuaScript? _loaded;

public async Task InitializeAsync()
{
    var server = _mux.GetServers().First();
    _loaded = await _script.LoadAsync(server);
}

// Kullanım: EVALSHA ile çalışır (script gövdesi gönderilmez)
public async Task<long> IncrementWithTtlAsync(string key, int amount, int ttlSeconds)
{
    var result = await _loaded!.EvaluateAsync(_db, new
    {
        key = (RedisKey)key,
        amount,
        ttl = ttlSeconds
    });
    return (long)result;
}
\`\`\`

</details>

> 💡 **\`LuaScript.Prepare\` vs \`LoadedLuaScript\`:** Prepare her çağrıda fallback EVAL yapabilir. \`LoadAsync\` ile preload edersen ilk çağrıda bile SHA kullanır → bandwidth tasarrufu (büyük script'lerde önemli).

> 🔗 **İlgili:** Rate Limiting ve Distributed Lock bölümlerindeki Lua script'leri de aynı pattern'la EVALSHA'ya optimize edilebilir.

### Lua Error Handling

Lua script hataları \`RedisServerException\` olarak fırlatılır. Failover sonrası script cache silinir → \`NOSCRIPT\` hatası gelir.

\`\`\`csharp
public class SafeScriptExecutor
{
    private readonly IDatabase _redis;
    private readonly ILogger<SafeScriptExecutor> _logger;

    private static readonly LuaScript _myScript = LuaScript.Prepare(@"
        local val = redis.call('GET', @key)
        if val == false then return -1 end
        return tonumber(val)
    ");

    public SafeScriptExecutor(IConnectionMultiplexer mux,
        ILogger<SafeScriptExecutor> logger)
    {
        _redis = mux.GetDatabase();
        _logger = logger;
    }

    public async Task<long> ExecuteSafeAsync(string key)
    {
        try
        {
            var result = await _redis.ScriptEvaluateAsync(_myScript, new
            {
                key = (RedisKey)key
            });
            return (long)result;
        }
        catch (RedisServerException ex) when (ex.Message.StartsWith("NOSCRIPT"))
        {
            // Failover sonrası script cache silindi
            // LuaScript.Prepare otomatik fallback yapar,
            // ama LoadedLuaScript kullanıyorsan reload gerekir:
            _logger.LogWarning("Script cache miss — NOSCRIPT. Retrying with EVAL...");
            var result = await _redis.ScriptEvaluateAsync(_myScript, new
            {
                key = (RedisKey)key
            });
            return (long)result;
        }
        catch (RedisServerException ex) when (ex.Message.Contains("ERR"))
        {
            // Lua runtime error (nil access, type mismatch, vb.)
            _logger.LogError(ex, "Lua script error for key {Key}: {Msg}", key, ex.Message);
            throw new InvalidOperationException($"Redis Lua error: {ex.Message}", ex);
        }
    }
}
\`\`\`

| Hata | Mesaj Prefix | Çözüm |
|------|-------------|-------|
| Script yok | \`NOSCRIPT\` | \`LuaScript.Prepare\` otomatik retry yapar. \`LoadedLuaScript\` ise reload gerekir. |
| Lua runtime | \`ERR user_script\` | Script logic hatası — debug et (\`redis.log\` veya \`EVAL\` ile test) |
| Timeout | \`BUSY\` | Script çok uzun sürüyor. \`SCRIPT KILL\` ile durdur. |
| Readonly | \`READONLY\` | Replica'ya script gönderilmiş — master'a yönlendir. |

> ⚠️ **\`SCRIPT KILL\` sadece yazma yapmamış script'i durdurur.** Yazma yapan script'i durdurmak için \`SHUTDOWN NOSAVE\` gerekir (tehlikeli). Script'leri kısa tut!

### Ne Zaman Distributed Lock Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Aynı kaynağa eşzamanlı yazma riski var | İdempotent operasyon (aynı işlem tekrar çalışsa sorun yok) | **Payment:** Aynı sipariş için 2× ödeme çekmeyi engelle |
| Expensive operation'ı 1 kez çalıştırmak yeterli | Read-only operasyonlar | **Rapor:** Günlük rapor oluşturma — 10 pod'dan sadece 1'i çalışsın |
| Leader election (scheduler, cron job) | Yüksek contention (100+ client aynı lock) → bottleneck | **Cron:** Her dakika 1 pod "düşen siparişleri iptal et" job'ını çalıştırır |
| Kısa süreli koordinasyon (<30s) | Uzun süreli lock (dakikalar) → expire riski + starvation | **Inventory:** Stok son 1 birim — 2 kişi aynı anda almaya çalışıyor |

> ⚠️ **KRİTİK:** Lock ≠ veri güvenliği. Lock expire olabilir (GC pause, network partition). **Fencing token olmadan distributed lock, yanlış güvenlik hissi verir.** Yukarıdaki SVG'de gösterildiği gibi: Client A lock tutarken GC pause yaşar → lock expire olur → Client B lock alır → A uyanır ve stale lock ile yazma yapar → **DATA CORRUPTION**. Çözüm: Her lock'a monoton artan fencing token ekle, resource tarafında token kontrolü yap.

> 💡 **Gerçek hayat senaryosu — Ödeme duplicate'ini engelleme:** Kullanıcı "Öde" butonuna 3 kez basar. Her request \`lock:payment:{orderId}\` alır → sadece ilki başarılı. Lock TTL 30s. İşlem bitince lock release. 2. ve 3. request "lock alınamadı" → HTTP 409 Conflict. **Ek güvenlik:** DB'de \`payment_idempotency_key\` UNIQUE constraint — lock başarısız olsa bile DB katmanı korur.

public class DistributedLockService
{
    private readonly IDatabase _redis;

    private static readonly LuaScript _releaseScript = LuaScript.Prepare(@"
        if redis.call('GET', @lockKey) == @lockValue then
            return redis.call('DEL', @lockKey)
        else
            return 0
        end
    ");

    public DistributedLockService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<IAsyncDisposable?> AcquireAsync(
        string resource, TimeSpan expiry,
        TimeSpan? waitTimeout = null, CancellationToken ct = default)
    {
        var lockKey = $"lock:{resource}";
        var lockValue = Guid.NewGuid().ToString("N");
        var deadline = DateTime.UtcNow + (waitTimeout ?? TimeSpan.FromSeconds(10));

        while (DateTime.UtcNow < deadline)
        {
            ct.ThrowIfCancellationRequested();

            var acquired = await _redis.StringSetAsync(
                lockKey, lockValue, expiry, When.NotExists);

            if (acquired)
                return new LockHandle(_redis, lockKey, lockValue, _releaseScript);

            await Task.Delay(50, ct);
        }
        return null; // Timeout — lock alınamadı
    }
}

public class LockHandle : IAsyncDisposable
{
    private readonly IDatabase _redis;
    private readonly string _lockKey;
    private readonly string _lockValue;
    private readonly LuaScript _releaseScript;
    private bool _released;

    public LockHandle(IDatabase redis, string lockKey, string lockValue, LuaScript releaseScript)
    {
        _redis = redis;
        _lockKey = lockKey;
        _lockValue = lockValue;
        _releaseScript = releaseScript;
    }

    public async ValueTask DisposeAsync()
    {
        if (_released) return;
        _released = true;
        await _redis.ScriptEvaluateAsync(_releaseScript, new
        {
            lockKey = (RedisKey)_lockKey,
            lockValue = _lockValue
        });
    }
}

// Kullanım
public class OrderProcessor
{
    private readonly DistributedLockService _locks;

    public async Task ProcessOrderAsync(int orderId)
    {
        await using var lockHandle = await _locks.AcquireAsync(
            $"order-process:{orderId}", TimeSpan.FromSeconds(30));

        if (lockHandle is null)
            throw new InvalidOperationException("Could not acquire lock");

        // Güvenli alan — aynı anda sadece 1 worker burada
        await DoProcessing(orderId);
    } // DisposeAsync → lock release
}

### Redlock: Çoklu Instance'da Distributed Lock

Tek Redis instance'da lock alan yukarıdaki pattern, o instance çökerse lock'u kaybeder. **Redlock** algoritması N bağımsız Redis node'undan N/2+1 quorum ile lock alır.

> ⚠️ **Ne zaman Redlock gerekir?** Sadece Redis master'un çökmesi durumunda bile lock garantisinin devam etmesi gereken senaryolar için. Çoğu uygulamada tek instance lock yeterlidir — Redlock karmaşıklık ekler.

> ⚠️ **RedLock.net paketi Nisan 2022'den beri güncellenmemiştir** (4+ yıl). Production'da kullanıyorsanız fork/maintain riski değerlendirin veya kendi Redlock implementasyonunuzu StackExchange.Redis üzerinde yazın.

public class PaymentProcessor
{
    private readonly IDistributedLockFactory _lockFactory;

    public async Task ProcessAsync(int orderId)
    {
        var resource = $"payment:{orderId}";
        var expiry = TimeSpan.FromSeconds(30);
        var wait = TimeSpan.FromSeconds(10);
        var retry = TimeSpan.FromMilliseconds(200);

        await using var redLock = await _lockFactory.CreateLockAsync(
            resource, expiry, wait, retry);

        if (!redLock.IsAcquired)
            throw new InvalidOperationException("Lock alınamadı");

        // N/2+1 node'dan lock alındı — güvenli alan
        await DoPayment(orderId);
    } // DisposeAsync → tüm node'lardan release
}

### Fencing Token: Lock Expire Sonrası Güvenlik

> ⚠️ **Kritik senaryo:** Client A lock alır → GC pause / network partition → lock expire olur → Client B lock alır → Client A "hâlâ lock'lu" sanarak resource'a yazar → **veri bozulması!**

Bu sorunu çözmek için **fencing token** pattern'ı kullanılır:

\`\`\`csharp
// Fencing Token Pattern — lock ile korunan resource'a
// monoton artan bir token gönderilir. Resource, eski token'ları reddeder.
public class FencedLockService
{
    private readonly IDatabase _redis;

    public FencedLockService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<(bool Acquired, long FenceToken)> AcquireWithFenceAsync(
        string resource, TimeSpan expiry)
    {
        var lockKey = $"lock:{resource}";
        var fenceKey = $"fence:{resource}";

        // Monoton artan fence token üret
        var fenceToken = await _redis.StringIncrementAsync(fenceKey);

        var acquired = await _redis.StringSetAsync(
            lockKey, fenceToken.ToString(), expiry, When.NotExists);

        return (acquired, fenceToken);
    }
}

// Korunan resource tarafı (DB, API, file system):
public class ProtectedResourceService
{
    private long _lastFenceToken = 0;

    public bool TryWrite(long fenceToken, Action writeAction)
    {
        // Eski token'ları reddet — stale lock owner yazamaz
        if (fenceToken <= _lastFenceToken)
            return false; // REJECTED — bu eski bir lock owner

        _lastFenceToken = fenceToken;
        writeAction();
        return true;
    }
}
\`\`\`

> 💡 **Ne zaman fencing gerekir?** Lock ile korunan işlem **idempotent değilse** (ör: ödeme, stok düşme, dosya yazma). Idempotent işlemlerde (cache invalidation gibi) fencing gereksiz overhead'dir.

> 🔗 **İlgili:** Transactions & Lua — atomik operasyonlar. | Rate Limiting — Lua ile atomik sayaç.

## Rate Limiting 🟠

### Ne Zaman Rate Limiting Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Public API (abuse koruması) | Internal service-to-service (trust boundary içi) | **SaaS API:** Free plan 100 req/dk, Pro plan 1000 req/dk |
| Login/register endpoint (brute-force) | Batch job / admin endpoint (kendi sisteminiz) | **Auth:** 5 başarısız login → 15dk ban (credential stuffing engeli) |
| Expensive endpoint (rapor, export) | Zaten queue ile throttle edilen işlemler | **Export:** CSV export max 2/saat (her biri 30s CPU) |
| Webhook receiver (upstream spike) | Read-only cached endpoint (zaten ucuz) | **Payment gateway:** Webhook flood'unda kendi DB'ni koru |

> 💡 **Endpoint tipine göre algoritma seçimi:**
> - **Login/Register:** Fixed Window (basit, 5 attempt/15dk yeterli)
> - **Public REST API:** Sliding Window (adil, burst yok, kullanıcı-facing)
> - **Mobile push notification:** Token Bucket (batch gönderim spike'larına tolerans)
> - **Payment gateway callback:** Leaky Bucket (downstream DB'ye sabit yük)
> - **WebSocket message:** Token Bucket (chat'te hızlı mesaj burst'ü normal)

### Algoritma Seçimi

| Algoritma | Nasıl Çalışır | Avantaj | Dezavantaj | Ne Zaman |
|-----------|--------------|---------|-----------|----------|
| **Fixed Window** | Sabit zaman diliminde sayaç (ör: 0:00-1:00) | Basit, O(1) memory | Pencere sınırında burst (2× limit) | Internal API, basit koruma |
| **Sliding Window** | Sorted Set + zaman bazlı kayan pencere | Burst yok, adil dağılım | O(N) memory (her request bir entry) | Public API, kullanıcı-facing |
| **Token Bucket** | Sabit hızla token eklenir, request token tüketir | Burst'a izin (bucket kapasitesi kadar) | Biraz daha karmaşık | Spike-tolerant API'lar |
| **Leaky Bucket** | Queue + sabit çıkış hızı | Tamamen düz throughput | Burst tolere etmez, latency ekler | Downstream koruma, payment |

> 💡 **Önerilen:** Çoğu API için **sliding window** yeterli. Burst istiyorsan token bucket. Downstream'i koruyorsan leaky bucket.

ZREMRANGEBYSCORE rate:user:1001 0 <now-60000>
ZCARD rate:user:1001
# < limit ise:
ZADD rate:user:1001 <now> "<now>:<random>"

<summary><b>🟣 .NET Core</b></summary>

\`\`\`csharp
public class RateLimiterService
{
    private readonly IDatabase _redis;

    private static readonly LuaScript _slidingWindowScript = LuaScript.Prepare(@"
        local key = @key
        local limit = tonumber(@limit)
        local window = tonumber(@window)
        local now = tonumber(@now)
        redis.call('ZREMRANGEBYSCORE', key, 0, now - window)
        local count = redis.call('ZCARD', key)
        if count < limit then
            redis.call('ZADD', key, now, now .. ':' .. math.random(1000000))
            redis.call('PEXPIRE', key, window)
            return count + 1
        end
        return -1
    ");

    public RateLimiterService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task<RateLimitResult> CheckAsync(string clientId, int limit, TimeSpan window)
    {
        var result = (int)await _redis.ScriptEvaluateAsync(_slidingWindowScript, new
        {
            key = (RedisKey)$"rate:{clientId}",
            limit,
            window = (long)window.TotalMilliseconds,
            now = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds()
        });

        return new RateLimitResult
        {
            IsAllowed = result > 0,
            CurrentCount = result > 0 ? result : limit,
            Limit = limit
        };
    }
}

// Middleware
public class RateLimitMiddleware
{
    private readonly RequestDelegate _next;
    private readonly RateLimiterService _rateLimiter;

    public RateLimitMiddleware(RequestDelegate next, RateLimiterService rateLimiter)
    {
        _next = next;
        _rateLimiter = rateLimiter;
    }

    public async Task InvokeAsync(HttpContext context)
    {
        var clientId = context.Connection.RemoteIpAddress?.ToString() ?? "unknown";
        var result = await _rateLimiter.CheckAsync(clientId, limit: 100, TimeSpan.FromMinutes(1));

        context.Response.Headers["X-RateLimit-Limit"] = "100";
        context.Response.Headers["X-RateLimit-Remaining"] =
            Math.Max(0, 100 - result.CurrentCount).ToString();

        if (!result.IsAllowed)
        {
            context.Response.StatusCode = 429;
            await context.Response.WriteAsync("Rate limit exceeded");
            return;
        }

        await _next(context);
    }
}

### ASP.NET Built-in Rate Limiter + Redis

.NET 7+ \`AddRateLimiter()\` middleware'i ile built-in rate limiting. Redis backing store ile multi-instance'da paylaşımlı limit.

\`\`\`csharp
// NuGet: dotnet add package System.Threading.RateLimiting

builder.Services.AddRateLimiter(options =>
{
    // Global sliding window — Redis-backed (custom partitioner)
    options.AddPolicy("api", httpContext =>
    {
        var clientIp = httpContext.Connection.RemoteIpAddress?.ToString() ?? "anon";
        return RateLimitPartition.GetSlidingWindowLimiter(clientIp, _ =>
            new SlidingWindowRateLimiterOptions
            {
                PermitLimit = 100,
                Window = TimeSpan.FromMinutes(1),
                SegmentsPerWindow = 6, // 10 saniyelik segment'ler
                QueueLimit = 0
            });
    });

    options.RejectionStatusCode = StatusCodes.Status429TooManyRequests;
    options.OnRejected = async (context, ct) =>
    {
        context.HttpContext.Response.Headers["Retry-After"] = "60";
        await context.HttpContext.Response.WriteAsync(
            "Rate limit exceeded. Try again later.", ct);
    };
});

app.UseRateLimiter();

// Endpoint'e uygula
app.MapGet("/api/data", () => Results.Ok())
    .RequireRateLimiting("api");
\`\`\`

> \u26a0\ufe0f **Built-in vs Custom Lua:** Built-in rate limiter tek instance'da memory-based \u00e7al\u0131\u015f\u0131r \u2014 multi-instance'da her pod kendi limit'ini tutar. Ger\u00e7ek distributed limit i\u00e7in yukar\u0131daki Lua-based sliding window \u00f6rne\u011fini kullan.

## Client-Side Caching (Tracking) 🟠

Redis 6+ RESP3 ile **server-assisted client caching**: Redis, client'ın cache'lediği key'ler değiştiğinde invalidation bildirimi gönderir. Network roundtrip'i tamamen ortadan kaldırır.

### Nasıl Çalışır?

1. Client, \`CLIENT TRACKING ON\` ile tracking'i aktifleştirir
2. Client GET yaptığında Redis hangi key'lerin okunduğunu takip eder
3. Başka bir client o key'i değiştirdiğinde Redis invalidation mesajı gönderir
4. Client local cache'den ilgili entry'yi siler → sonraki okuma Redis'e gider

\`\`\`csharp
// Client-side caching: IMemoryCache + Redis invalidation
// StackExchange.Redis 2.6.100+ RESP3 tracking desteği sunar
// Ancak tam otomatik client-side cache henüz built-in değil.
// En pratik yaklaşım: Keyspace notifications + IMemoryCache hybrid

public class ClientSideCacheService
{
    private readonly IDatabase _redis;
    private readonly IMemoryCache _localCache;
    private readonly ISubscriber _subscriber;
    private readonly TimeSpan _localTtl = TimeSpan.FromSeconds(30);
    private readonly ILogger<ClientSideCacheService> _logger;

    public ClientSideCacheService(
        IConnectionMultiplexer mux,
        IMemoryCache memoryCache,
        ILogger<ClientSideCacheService> logger)
    {
        _redis = mux.GetDatabase();
        _localCache = memoryCache;
        _subscriber = mux.GetSubscriber();
        _logger = logger;
        SubscribeToInvalidations();
    }

    private void SubscribeToInvalidations()
    {
        // Keyspace notifications ile invalidation
        // redis.conf: notify-keyspace-events KEA
        _subscriber.Subscribe(
            RedisChannel.Pattern("__keyevent@0__:*"),
            (channel, key) =>
            {
                var eventType = channel.ToString().Split(':').Last();
                if (eventType is "set" or "del" or "expire" or "expired")
                {
                    _localCache.Remove(key.ToString());
                    _logger.LogDebug("Local cache invalidated: {Key} ({Event})",
                        key, eventType);
                }
            });
    }

    // L1 (local) → L2 (Redis) stratejisi
    public async Task<T?> GetAsync<T>(string key) where T : class
    {
        // L1: Memory cache (0 latency)
        if (_localCache.TryGetValue(key, out T? local))
            return local;

        // L2: Redis
        var value = await _redis.StringGetAsync(key);
        if (!value.HasValue) return null;

        var result = JsonSerializer.Deserialize<T>(value!);
        if (result is not null)
        {
            // L1'e yaz — invalidation gelene kadar geçerli
            _localCache.Set(key, result, _localTtl);
        }
        return result;
    }

    public async Task SetAsync<T>(string key, T value, TimeSpan ttl)
    {
        await _redis.StringSetAsync(key,
            JsonSerializer.Serialize(value), ttl);
        // Local cache'i güncelle (kendi yazdığımızı biz biliriz)
        _localCache.Set(key, value, _localTtl);
    }
}

|----------|---------|------------|--------|----------|
| Sadece Redis | ~0.5ms | Güçlü | 0 client | Çoğu uygulama |

public class BatchService
{
    private readonly IDatabase _redis;

    public BatchService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // Batch (fire-and-forget + await sonuçları)
    public async Task<Dictionary<string, string?>> BatchGetAsync(IEnumerable<string> keys)
    {
        var batch = _redis.CreateBatch();
        var tasks = keys.ToDictionary(
            k => k,
            k => batch.StringGetAsync(k));
        batch.Execute();

        var results = new Dictionary<string, string?>();
        foreach (var (key, task) in tasks)
        {
            var value = await task;
            results[key] = value.HasValue ? value.ToString() : null;
        }
        return results;
    }

    // Pipeline ile bulk write
    public async Task BulkSetAsync(Dictionary<string, string> data, TimeSpan ttl)
    {
        var batch = _redis.CreateBatch();
        var tasks = new List<Task>();

        foreach (var (key, value) in data)
        {
            tasks.Add(batch.StringSetAsync(key, value, ttl));
        }

        batch.Execute();
        await Task.WhenAll(tasks);
    }

    // FireAndForget (sonucu beklemeden)
    public void IncrementNoWait(string key)
    {
        _redis.StringIncrement(key, flags: CommandFlags.FireAndForget);
    }
}

## Connection Pooling & Performans 🟠

StackExchange.Redis varsayılan olarak **tek TCP bağlantı üzerinden multiplexing** yapar. Çoğu senaryo için yeterli. Ama çok yoğun senaryolarda (>50K ops/s) tek connection bottleneck olabilir.

### Ne Zaman Connection Pool Kullan / Kullanma

| ✅ Kullan (Pool) | ❌ Kullanma (Tek Multiplexer yeterli) | Gerçek Hayat |
|-----------|------------|--------------|
| >50K ops/s throughput, tek pipe doyuyor | <50K ops/s — çoğu web app | **High-traffic API:** 100K req/s → 2-4 multiplexer pool |
| Büyük value'lar (>10KB) sık transfer | Küçük key/value (<1KB) operasyonları | **Media:** Thumbnail cache — 50KB value'lar pipeline'ı tıkar |
| Uzun süren blocking komutlar (BLPOP) var | Sadece async non-blocking komutlar | **Queue:** BLPOP worker'ları ayrı connection kullanmalı |
| CPU-bound serialize/deserialize ağır | Serialize hafif (küçük JSON) | **ML:** Model result cache — 100KB JSON serialize → ayrı pipe |

> 💡 **Gerçek hayat senaryosu — E-ticaret Black Friday:** Normal günlerde tek multiplexer 15K ops/s taşıyor. Black Friday'de 80K ops/s'e çıkıyor → ThreadPool starvation + timeout spike. Çözüm: 4 multiplexer'lık pool → her biri 20K ops/s taşır, timeout kaybolur.

// === Yaklaşım 2: Connection Pool (çok yoğun senaryolar — >50K ops/s) ===
//
// ⚠️ MALIYET ANALİZİ — her yeni ConnectionMultiplexer:
//   1. TCP 3-way handshake         → ~0.5ms (aynı DC), ~50-100ms (cross-region)
//   2. TLS handshake (ssl=true)    → +2-10ms (ECDHE key exchange, cert validation)
//   3. AUTH komutu                 → +0.1ms
//   4. CLIENT SETNAME              → +0.1ms
//   5. Toplam bağlantı maliyeti    → 3-110ms (ortama bağlı)
//   6. Server-side: file descriptor + ~10KB memory + keepalive timer
//   7. GC: ConnectionMultiplexer ~Gen2 object (~80KB) — Dispose edilmezse LOH leak
//
// Bu maliyet startup'ta BİR KERE ödenir (pool Singleton olduğu için).
// Ama pool boyutunu gereksiz büyütme — her connection = server resource.
//
public class RedisConnectionPool : IDisposable
{
    private readonly ConnectionMultiplexer[] _connections;
    private int _index;

    public RedisConnectionPool(string connectionString, int poolSize = 4)
    {
        // poolSize önerisi: Math.Min(Environment.ProcessorCount, 8)
        // 8'den fazla diminishing returns — Redis single-thread!
        _connections = new ConnectionMultiplexer[poolSize];
        var config = ConfigurationOptions.Parse(connectionString);
        config.AbortOnConnectFail = false;

        for (int i = 0; i < poolSize; i++)
        {
            _connections[i] = ConnectionMultiplexer.Connect(config);
        }
    }

    public IDatabase GetDatabase(int db = -1)
    {
        var idx = Interlocked.Increment(ref _index) % _connections.Length;
        return _connections[idx].GetDatabase(db);
    }

    public ISubscriber GetSubscriber()
    {
        var idx = Interlocked.Increment(ref _index) % _connections.Length;
        return _connections[idx].GetSubscriber();
    }

    public void Dispose()
    {
        // ConnectionMultiplexer IDisposable — uygulama kapanırken temizle
        foreach (var conn in _connections)
            conn?.Dispose();
    }
}

// DI kayıt (Singleton — startup'ta 1 kez pool oluştur)
builder.Services.AddSingleton<RedisConnectionPool>(sp =>
    new RedisConnectionPool(
        builder.Configuration.GetConnectionString("Redis")!,
        poolSize: Math.Min(Environment.ProcessorCount, 8)));

public class PerformanceTipsService
{
    private readonly IDatabase _redis;

    public PerformanceTipsService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    // 1. FireAndForget — response bekleme (0 await, 0 Task allocation)
    public void TrackPageView(string page)
    {
        _redis.StringIncrement($"views:{page}", flags: CommandFlags.FireAndForget);
    }

    // 2. Batch — tek roundtrip'te çoklu komut
    public async Task WarmupCacheAsync(IEnumerable<(string key, string value)> items)
    {
        var batch = _redis.CreateBatch();
        var tasks = items.Select(i =>
            batch.StringSetAsync(i.key, i.value, TimeSpan.FromMinutes(30))).ToList();
        batch.Execute();
        await Task.WhenAll(tasks);
    }

    // 3. Pipeline-friendly: await'leri sona topla
    public async Task<(string? a, string? b, string? c)> GetMultipleAsync()
    {
        // 3 komut TEK TCP üzerinden pipeline'lanır — 1 roundtrip
        var taskA = _redis.StringGetAsync("key:a");
        var taskB = _redis.StringGetAsync("key:b");
        var taskC = _redis.StringGetAsync("key:c");
        return (await taskA, await taskB, await taskC);
    }

    // 4. GC-friendly: büyük value'ları ReadOnlyMemory<byte> ile oku
    // string dönüşümü heap allocation yapar, byte[] direkt kullanım daha iyi
    public async Task<byte[]?> GetRawAsync(string key)
    {
        RedisValue val = await _redis.StringGetAsync(key);
        return val.HasValue ? (byte[])val! : null;
    }

    // 5. Avoid: büyük value (>1MB) — network buffer + GC LOH
    // 6. Avoid: sık KEYS/SCAN — client-side index tut
    // 7. Prefer: Hash over JSON string (kısmi read/write = less bandwidth)
}

### Performans Karşılaştırması

| Yaklaşım | Throughput | Latency | GC Pressure | Handshake | Ne Zaman |
|----------|-----------|---------|-------------|-----------|----------|
| Tek Multiplexer | ~200K ops/s | <1ms p99 | Sıfır (Singleton) | 1× startup | Çoğu uygulama |
| Pool (4 conn) | ~600K ops/s | <0.5ms p99 | ~320KB Gen2 (4×80KB) | 4× startup | >50K ops/s, CPU-bound |
| GetDatabase(n≠default) | Aynı | +14 byte/cmd | Sıfır | Yok | Multi-tenant namespace |
| FireAndForget | ~1M+ ops/s | 0 (beklemez) | Sıfır (no Task) | — | Analytics, counter |
| Batch (100 cmd) | ~500K ops/s | Toplu | Task[] alloc | — | Warmup, migration |
| Per-request Connect ❌ | ~1K ops/s | 3-110ms!! | Gen2 churn | HER REQUEST | ASLA |

> ⚠️ **Pool maliyeti:**
> - Her ConnectionMultiplexer = 1 TCP + TLS handshake (startup'ta 1 kez).
> - Server-side: +1 file descriptor, ~10KB buffer, keepalive timer per connection.
> - Client-side: ConnectionMultiplexer ~80KB Gen2 object. Pool'un Dispose edilmemesi = memory leak.
> - Redis **single-threaded** — 8'den fazla connection client bottleneck'i çözer ama Redis CPU'yu hızlandırmaz.
> - **4-8 arası** genellikle yeterli. Ölç, sonra artır.

> 💡 **Optimizasyon sırası (önce ucuz olanlar):**
> 1. \`FireAndForget\` — Task allocation yok, await yok
> 2. Paralel Task fire + toplu await — 1 roundtrip'te N komut
> 3. \`Hash\` kullan — kısmi read/write, daha az bandwidth
> 4. Büyük value'ları parçala — GC LOH pressure azalt
> 5. \`ReadOnlyMemory<byte>\` ile çalış — string allocation'dan kaçın
> 6. **Pool (son çare)** — yukarıdakiler yetmezse multiplexer sayısını artır

### Reconnection Events & Logging

Bağlantı koptuğunda ne olduğunu bilmek debugging için kritik. StackExchange.Redis event'leri structured logging ile yakalanmalı.

\`\`\`csharp
builder.Services.AddSingleton<IConnectionMultiplexer>(sp =>
{
    var logger = sp.GetRequiredService<ILogger<Program>>();
    var config = ConfigurationOptions.Parse(
        builder.Configuration.GetConnectionString("Redis")!);
    config.AbortOnConnectFail = false;

    var mux = ConnectionMultiplexer.Connect(config);

    mux.ConnectionFailed += (sender, e) =>
    {
        logger.LogError(e.Exception,
            "Redis connection failed: {EndPoint}, {FailureType}, {ConnectionType}",
            e.EndPoint, e.FailureType, e.ConnectionType);
    };

    mux.ConnectionRestored += (sender, e) =>
    {
        logger.LogInformation(
            "Redis connection restored: {EndPoint}, {ConnectionType}",
            e.EndPoint, e.ConnectionType);
    };

    mux.ErrorMessage += (sender, e) =>
    {
        logger.LogWarning("Redis server error: {EndPoint}, {Message}",
            e.EndPoint, e.Message);
    };

    mux.InternalError += (sender, e) =>
    {
        logger.LogError(e.Exception,
            "Redis internal error: {EndPoint}, {Origin}",
            e.EndPoint, e.Origin);
    };

    return mux;
});
\`\`\`

> ⚠️ **Event handler'da blocking I/O yapma.** Log yaz, metric artır, alert tetikle — ama DB sorgusu veya HTTP call yapma. Event thread StackExchange.Redis'in internal pipeline'ını bloklar.

### Ne Zaman Health Check / Resilience Pattern Kullan

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Redis cache'in düştüğünü hızlı anlamak gerekiyor | Tek test ortamı, Redis local | **SaaS:** K8s readiness probe Redis ping — pod traffic'ten çıkar |
| Circuit breaker ile cascade failure engellemek | Basit script, hata tolere edilebilir | **Fintech:** Redis timeout → breaker açılır → DB fallback (yavaş ama çalışır) |
| Graceful degradation (cache miss → DB) | Cache olmadan çalışamayan mimari (tasarım hatası) | **E-ticaret:** Black Friday'de Redis OOM → cache bypass, DB'ye düş, satış durmaz |
| Multi-service ortam, her servisin health'i izleniyor | Monolith + tek Redis, ops team yok | **Microservices:** Tüm pod'lar /health/ready raporlar → LB sağlıksız pod'u çıkarır |

> 💡 **Gerçek hayat senaryosu — Graceful degradation:** E-ticaret ürün kataloğu Redis'ten okunuyor. Redis down → circuit breaker OPEN → cache bypass aktif → DB'den oku (50ms vs 0.3ms ama çalışır). Kullanıcı fark etmez, sadece P99 yükselir. Monitoring alert → ops team müdahale eder.

public class ResilientCacheService
{
    private readonly IDatabase _redis;
    private readonly ResiliencePipeline _pipeline;
    private readonly ILogger<ResilientCacheService> _logger;

    public ResilientCacheService(
        IConnectionMultiplexer mux,
        ResiliencePipeline pipeline,
        ILogger<ResilientCacheService> logger)
    {
        _redis = mux.GetDatabase();
        _pipeline = pipeline;
        _logger = logger;
    }

    public async Task<T?> GetAsync<T>(string key) where T : class
    {
        try
        {
            var result = await _pipeline.ExecuteAsync(async ct =>
            {
                var value = await _redis.StringGetAsync(key);
                return value.HasValue ? JsonSerializer.Deserialize<T>(value!) : null;
            });
            return result;
        }
        catch (Exception ex)
        {
            // Redis down → graceful degradation (null döner, DB'den okunur)
            _logger.LogWarning(ex, "Redis unavailable for key {Key}", key);
            return null;
        }
    }
}

### Custom Health Check (Detaylı)

Built-in health check sadece PING yapar. Production'da memory, fragmentation, client count ve persistence durumunu kontrol eden custom check gerekir.

\`\`\`csharp
public class RedisDetailedHealthCheck : IHealthCheck
{
    private readonly IConnectionMultiplexer _mux;

    public RedisDetailedHealthCheck(IConnectionMultiplexer mux) => _mux = mux;

    public async Task<HealthCheckResult> CheckHealthAsync(
        HealthCheckContext context, CancellationToken ct = default)
    {
        try
        {
            var server = _mux.GetServers().First();
            var info = await server.InfoAsync();

            var memory = info.First(s => s.Key == "memory")
                .ToDictionary(p => p.Key, p => p.Value);
            var clients = info.First(s => s.Key == "clients")
                .ToDictionary(p => p.Key, p => p.Value);
            var persistence = info.First(s => s.Key == "persistence")
                .ToDictionary(p => p.Key, p => p.Value);

            var usedMemory = long.Parse(memory["used_memory"]);
            var maxMemory = long.Parse(memory.GetValueOrDefault("maxmemory") ?? "0");
            var fragRatio = double.Parse(memory["mem_fragmentation_ratio"]);
            var connectedClients = int.Parse(clients["connected_clients"]);
            var lastSave = long.Parse(persistence["rdb_last_save_time"]);

            var data = new Dictionary<string, object>
            {
                ["used_memory_mb"] = usedMemory / 1024 / 1024,
                ["fragmentation_ratio"] = fragRatio,
                ["connected_clients"] = connectedClients,
                ["last_save_minutes_ago"] = (DateTimeOffset.UtcNow.ToUnixTimeSeconds() - lastSave) / 60
            };

            // Degraded: memory >70% veya fragmentation >1.5
            if (maxMemory > 0 && (double)usedMemory / maxMemory > 0.8)
                return HealthCheckResult.Unhealthy("Memory >80%", data: data);

            if (fragRatio > 1.5)
                return HealthCheckResult.Degraded("High fragmentation", data: data);

            if ((DateTimeOffset.UtcNow.ToUnixTimeSeconds() - lastSave) > 7200)
                return HealthCheckResult.Degraded("No RDB save in 2h", data: data);

            return HealthCheckResult.Healthy("OK", data);
        }
        catch (Exception ex)
        {
            return HealthCheckResult.Unhealthy("Redis unreachable", ex);
        }
    }
}

## Redis Exception Handling 🔴

StackExchange.Redis farklı hata türleri fırlatır. Doğru yakalama ve yönetim kritik.

### Exception Tipleri

| Exception | Ne Zaman | Retry? | Aksiyon |
|-----------|----------|:------:|---------|
| \`RedisConnectionException\` | Bağlantı kopuk/kurulamıyor | ✅ Evet | Polly retry + circuit breaker |
| \`RedisTimeoutException\` | Komut timeout'a uğradı | ✅ Dikkatli | İlk retry, 3. tekrarda degrade |
| \`RedisServerException\` | Redis hata döndü (OOM, READONLY, WRONGTYPE) | ❌ Genelde hayır | Mesajı parse et, uygun handle |
| \`RedisCommandException\` | Komut sözdizimi/izin hatası | ❌ Hayır | Kod düzelt, ACL kontrol |
| \`ObjectDisposedException\` | Multiplexer dispose edilmiş | ❌ Hayır | Lifecycle hatası — DI kontrol |

\`\`\`csharp
public class RedisExceptionHandler
{
    private readonly IDatabase _redis;
    private readonly ILogger _logger;

    public RedisExceptionHandler(IConnectionMultiplexer mux, ILogger<RedisExceptionHandler> logger)
    {
        _redis = mux.GetDatabase();
        _logger = logger;
    }

    public async Task<T?> ExecuteWithHandlingAsync<T>(string key, Func<IDatabase, Task<T>> operation)
    {
        try
        {
            return await operation(_redis);
        }
        catch (RedisConnectionException ex)
        {
            // Bağlantı yok — retry pipeline'a düşür veya graceful degrade
            _logger.LogWarning(ex, "Redis connection failed for {Key}", key);
            return default; // Fallback: DB'den oku
        }
        catch (RedisTimeoutException ex)
        {
            // Komut timeout — Redis yoğun veya big key blokaj
            _logger.LogWarning(ex, "Redis timeout for {Key}. Timeout: {Timeout}ms",
                key, ex.Message);
            return default;
        }
        catch (RedisServerException ex) when (ex.Message.StartsWith("OOM"))
        {
            // Redis memory dolu — eviction policy'ye rağmen yazılamıyor
            _logger.LogError(ex, "Redis OOM! Key: {Key}", key);
            throw; // Bu ciddi — uygulama seviyesinde handle et
        }
        catch (RedisServerException ex) when (ex.Message.StartsWith("READONLY"))
        {
            // Failover sırasında — replica'ya yazma denemesi
            _logger.LogWarning(ex, "Redis READONLY — failover in progress?");
            await Task.Delay(1000); // Kısa bekle, yeni master keşfedilsin
            return await operation(_redis); // 1 retry
        }
        catch (RedisServerException ex) when (ex.Message.StartsWith("WRONGTYPE"))
        {
            // Yanlış veri tipi — kod hatası (SET ile yazılmış, HGET ile okunuyor)
            _logger.LogError(ex, "Redis WRONGTYPE for {Key} — data type mismatch", key);
            throw; // Caller'ın düzeltmesi gereken bug
        }
    }
}

## Ne Zaman Hangi Güvenlik Katmanı

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| **ACL (Redis 6+)** — Her servis kendi user'ı ile bağlanır | Tek shared password tüm servislere | **Fintech:** payment-service sadece \`pay:\` prefix'e yazabilir, analytics read-only |
| **TLS** — Redis dış network'ten erişilebilir veya compliance gerekli | Aynı VPC/host içinde, performance-critical | **SaaS multi-tenant:** Data center arası replikasyon — TLS zorunlu |
| **requirepass** — Redis 5 legacy veya tek uygulama bağlanıyor | Multi-service environment (ACL tercih et) | **Monolith:** Tek .NET app → tek şifre yeterli, ACL overhead gereksiz |
| **Network isolation (VPC/firewall)** — Her zaman, ek güvenlik katmanı | "Şifre var, firewall gereksiz" düşüncesi | **Startup:** Redis public IP'de, şifresiz → cryptominer 20 dakikada bulur |
| **Key prefix ACL** — Multi-tenant data separation | Tenant isolation sadece application code'da | **E-ticaret marketplace:** seller:123:* sadece ilgili servise açık |

> 💡 **Gerçek hayat senaryosu — Healthcare SaaS:** HIPAA compliance → TLS zorunlu + ACL ile audit trail + her microservice ayrı user. Bir servis compromise olsa bile diğer tenant verisine erişemez.

| Kategori | İçerik | Kime Verilir |
|----------|--------|-------------|
| **@read** | GET, MGET, HGETALL, LRANGE... | Read-only service |
| **@write** | SET, HSET, LPUSH, DEL... | Write service |

| **@pubsub** | PUBLISH, SUBSCRIBE... | Event bus |
| **@admin** | CONFIG, SHUTDOWN, REPLICAOF... | Ops team only |
| **@dangerous** | FLUSHALL, KEYS, DEBUG... | **Kimseye verme** |
| **@stream** | XADD, XREAD, XGROUP... | Stream consumer |

### Güvenlik Checklist

| # | Kontrol | Seviye |
|---|---------|--------|
| 1 | \`requirepass\` veya ACL aktif | Minimum |
| 2 | Servis bazlı ACL kullanıcıları | Önerilen |
| 3 | \`~key-pattern*\` ile key erişimi kısıtla | Önerilen |

| 11 | Idle timeout (\`timeout 300\`) | Resource leak |

### Ne Zaman Redis Session Kullan / Kullanma

| ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|-----------|------------|--------------|
| Multi-instance/pod uygulama — session paylaşımı gerekli | Tek pod, in-memory session yeterli | **SaaS:** 5 pod arkasında LB — hangi pod'a düşerse düşsün session geçerli |
| Sticky session istemiyorsun (LB esnekliği) | JWT-only auth (stateless, session yok) | **E-ticaret:** Pod restart'ta kullanıcı çıkış yapmaz |
| Session içeriği küçük (userId, role, preferences) | Büyük objeleri session'da tutmak (dosya, sepet detayı) | **Chat app:** Online status + last-seen → küçük Hash, sliding TTL |
| Hızlı invalidation gerekli (force logout, güvenlik) | Sadece login/logout, arada session'a erişim yok | **Fintech:** Fraud algılandığında anında tüm session'ları DEL |

> 💡 **Gerçek hayat senaryosu — Force logout:** Admin panelden kullanıcıyı "tüm cihazlardan çıkar" yapmak istiyorsun. Redis'te \`SCAN session:* MATCH *userId:1001*\` + \`DEL\` ile tüm session'larını anında sil. JWT token'ları expire olana kadar geçerli kalır — Redis session ise **anında** invalidate edilir.

public class RedisSessionService
{
    private readonly IDatabase _redis;

    public RedisSessionService(IConnectionMultiplexer mux)
        => _redis = mux.GetDatabase();

    public async Task CreateSessionAsync(string sessionId, SessionData data)
    {
        var key = $"session:{sessionId}";
        await _redis.HashSetAsync(key, new HashEntry[]
        {
            new("userId", data.UserId),
            new("role", data.Role),
            new("loginAt", DateTimeOffset.UtcNow.ToUnixTimeSeconds().ToString())
        });
        await _redis.KeyExpireAsync(key, TimeSpan.FromMinutes(30));
    }

    public async Task<SessionData?> GetSessionAsync(string sessionId)
    {
        var key = $"session:{sessionId}";
        var entries = await _redis.HashGetAllAsync(key);
        if (entries.Length == 0) return null;

        // Sliding expiration
        await _redis.KeyExpireAsync(key, TimeSpan.FromMinutes(30));

        var dict = entries.ToDictionary(e => e.Name.ToString(), e => e.Value.ToString());
        return new SessionData
        {
            UserId = dict.GetValueOrDefault("userId") ?? "",
            Role = dict.GetValueOrDefault("role") ?? ""
        };
    }

    public async Task DestroySessionAsync(string sessionId)
    {
        await _redis.KeyDeleteAsync($"session:{sessionId}");
    }

    // Session Fixation koruması — login/role değişiminde ID yenile
    public async Task<string> RotateSessionAsync(string oldSessionId)
    {
        var oldKey = $"session:{oldSessionId}";
        var entries = await _redis.HashGetAllAsync(oldKey);
        if (entries.Length == 0)
            throw new InvalidOperationException("Session not found");

        // Yeni session ID üret
        var newSessionId = Convert.ToBase64String(
            RandomNumberGenerator.GetBytes(32));
        var newKey = $"session:{newSessionId}";

        // Veriyi yeni key'e taşı
        await _redis.HashSetAsync(newKey, entries);
        await _redis.KeyExpireAsync(newKey, TimeSpan.FromMinutes(30));

        // Eski session'ı sil
        await _redis.KeyDeleteAsync(oldKey);

        return newSessionId;
    }
}
\`\`\`

> ⚠️ **Session Fixation:** Kullanıcı login olduğunda veya yetki seviyesi değiştiğinde **mutlaka** \`RotateSessionAsync\` çağır. Eski session ID'yi geçersiz kıl — aksi halde saldırgan eski ID ile oturum ele geçirebilir (OWASP A07).

## Anti-Patterns & Troubleshooting 🔴

| Anti-Pattern | Sorun | Doğru Yaklaşım |
|-------------|-------|----------------|
| KEYS komutu | O(N) — production'ı bloklar | \`SCAN\` ile iterate et |
| Big key (>1MB) | >85KB → .NET LOH (Gen2 GC pressure), >1MB → network buffer spike + Redis single-thread blokaj, DELETE/UNLINK bile yavaş | Parçala (Hash field'ları, chunk'lar), \`UNLINK\` (async), \`MEMORY USAGE key\` ile kontrol |
| Hot key | Tek shard'a aşırı yük | Local in-memory cache + random suffix |
| TTL yok | Memory leak — eviction'a düşer | Her key'e explicit TTL |
| Fire-and-forget everywhere | Hata yakalanamaz | Critical ops'larda await kullan |
| \`ConnectionMultiplexer\` per-request | Connection explosion | **Singleton** kullan (\`GetDatabase(n)\` ile multi-DB bile olsa Singleton yeterli) |
| Blocking ops (BLPOP) uzun timeout | Connection havuzunu tüketir | Ayrı multiplexer veya kısa timeout |
| Multi-DB + Cluster/Sentinel | Cluster'da SELECT hata verir, Sentinel sadece db0 monitor eder | Key prefix ile namespace (\`cache:\`, \`session:\`) |
| Her servis ayrı Redis instance | Kaynak israfı, yönetim karmaşıklığı | Tek instance + ACL + key prefix |

// IMemoryCache + Redis hybrid (hot key koruması)
public class HybridCacheService
{
    private readonly IDatabase _redis;
    private readonly IMemoryCache _localCache;
    private readonly TimeSpan _localTtl = TimeSpan.FromSeconds(5);

    public HybridCacheService(IConnectionMultiplexer mux, IMemoryCache memoryCache)
    {
        _redis = mux.GetDatabase();
        _localCache = memoryCache;
    }

    public async Task<T?> GetHotKeyAsync<T>(string key) where T : class
    {
        // 1. Local cache (L1)
        if (_localCache.TryGetValue(key, out T? local))
            return local;

        // 2. Redis (L2)
        var cached = await _redis.StringGetAsync(key);
        if (!cached.HasValue) return null;

        var value = JsonSerializer.Deserialize<T>(cached!);
        _localCache.Set(key, value, _localTtl); // L1'e yaz
        return value;
    }
}
\`\`\`

### Memory Leak Teşhisi

<details>
<summary><b>🔴 Redis CLI</b></summary>

\`\`\`bash
# 1. Genel memory durumu
INFO memory
# used_memory_human: 1.2GB
# mem_fragmentation_ratio: 1.15  (>1.5 = sorun!)
# maxmemory: 2GB

# 2. Büyük key'leri bul (sampling-based)
redis-cli --bigkeys
# [00.00%] Biggest string: "cache:report:annual" (4.2MB)

# 3. Belirli key'in memory maliyeti
MEMORY USAGE cache:report:annual
# 4423680 bytes

# 4. Idle key'leri bul (TTL olmayan zombiler)
# redis.conf: maxmemory-policy = allkeys-lfu gerekir (OBJECT FREQ için)
OBJECT IDLETIME cache:stale:key    # son erişimden beri saniye
OBJECT FREQ cache:hot:key          # erişim frekansı (LFU)

# 5. Sistematik leak arama: SCAN + TTL kontrolü
# TTL'siz key'leri bul (potansiyel leak):
redis-cli --scan --pattern "*" | while read key; do
  ttl=$(redis-cli TTL "$key")
  if [ "$ttl" = "-1" ]; then
    size=$(redis-cli MEMORY USAGE "$key")
    echo "$key: $size bytes (NO TTL)"
  fi
done | sort -t: -k2 -rn | head -20

# 6. Memory doctor
MEMORY DOCTOR
# "Sam, I have a few observations..."
\`\`\`
